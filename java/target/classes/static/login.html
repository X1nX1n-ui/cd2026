<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威胁感知平台 - 登录</title>
    <link rel="stylesheet" href="https://cdn.staticfile.net/layui/2.9.13/css/layui.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-body">
<div class="login-shell">
    <div class="login-panel">
        <section class="login-hero">
            <div class="eyebrow">THREAT AWARENESS PLATFORM</div>
            <h1 class="login-title login-title-strong">威胁感知平台</h1>
            <div class="login-tags">
                <span class="login-tag">威胁监测</span>
                <span class="login-tag">资产管理</span>
                <span class="login-tag">权限控制</span>
            </div>
        </section>

        <section class="login-form-panel">
            <h2 class="panel-title">系统登录</h2>
            <form class="layui-form tech-form" id="loginForm">
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <input type="text" name="userName" required lay-verify="required" placeholder="请输入用户名" autocomplete="username" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <input type="password" name="password" required lay-verify="required" placeholder="请输入密码" autocomplete="current-password" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item login-form-meta">
                    <input type="checkbox" name="rememberMe" title="记住用户名" lay-skin="primary" checked>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn tech-btn" lay-submit lay-filter="loginSubmit">登录</button>
                    </div>
                </div>
            </form>
        </section>
    </div>
</div>

<script src="https://cdn.staticfile.net/layui/2.9.13/layui.js"></script>
<script src="/js/common.js"></script>
<script>
    layui.use(["form", "layer"], function () {
        const form = layui.form;
        const layer = layui.layer;
        const remembered = PlatformUtils.getRememberedLogin();
        const usernameInput = document.querySelector('input[name="userName"]');
        const rememberInput = document.querySelector('input[name="rememberMe"]');

        if (remembered.userName) {
            usernameInput.value = remembered.userName;
            rememberInput.checked = !!remembered.rememberMe;
        }

        form.render();

        form.on("submit(loginSubmit)", function (data) {
            const fields = data.field;
            const rememberMe = fields.rememberMe === "on";
            const userName = (fields.userName || "").trim();
            const password = fields.password || "";

            if (!userName) {
                layer.msg("请输入用户名");
                return false;
            }
            if (!password) {
                layer.msg("请输入密码");
                return false;
            }

            fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    userName: userName,
                    password: password,
                    rememberMe: rememberMe
                })
            })
                .then(async function (response) {
                    const result = await response.json();
                    if (!response.ok || !result.success || !result.token) {
                        throw new Error(result.message || "登录失败");
                    }
                    PlatformUtils.saveAuth(result.token, result.user, rememberMe);
                    PlatformUtils.saveRememberedLogin({
                        userName: userName,
                        rememberMe: rememberMe,
                        hasActiveToken: false
                    });
                    layer.msg("登录成功，正在进入平台...", {icon: 1, time: 700}, function () {
                        window.location.href = "/index.html";
                    });
                })
                .catch(function (error) {
                    PlatformUtils.saveRememberedLogin({
                        userName: userName,
                        rememberMe: rememberMe,
                        hasActiveToken: false
                    });
                    layer.msg(error.message || "登录失败");
                });
            return false;
        });
    });
</script>
</body>
</html>
