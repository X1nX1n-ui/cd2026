<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心</title>
<link rel="stylesheet" href="/css/layui.css?v=3">
<link rel="stylesheet" href="/css/app.css?v=3">
<style>
.avatar-actions{display:flex;gap:12px;justify-content:center;margin-top:8px}
.avatar-action-btn{height:40px;line-height:40px;padding:0 20px;font-size:14px;min-width:100px}
.avatar-file-input{display:none}
.avatar-preview-wrap{width:140px;height:140px;margin:0 auto;border-radius:50%;overflow:hidden;border:2px solid rgba(79,134,247,.2)}
.avatar-preview{width:100%;height:100%;object-fit:cover;display:block}
.avatar-meta{text-align:center;font-size:13px;color:#9499a5;margin-top:8px}
.avatar-tip{font-size:12px;color:rgba(148,153,165,.5);text-align:center;margin-top:8px}
.profile-avatar-card{align-items:center}
</style>
</head>
<body class="app-body">
<div class="page-shell">
<div class="page-section">
<section class="page-heading"><div><h1>个人中心</h1><p>管理您的账户信息和账号安全</p></div></section>
<section class="profile-layout">
<article class="profile-card profile-avatar-card" style="display:flex;flex-direction:column;align-items:center;text-align:center">
<h2>头像</h2>
<div class="avatar-preview-wrap"><img id="avatarPreview" class="avatar-preview" src="/images/default-avatar.svg" alt="头像预览"></div>
<div class="avatar-meta" id="avatarName">尚未设置头像</div>
<div class="avatar-actions">
<input type="file" id="avatarFile" class="avatar-file-input" accept=".jpg,.jpeg,.png,.gif,.webp,image/*">
<button type="button" class="layui-btn page-btn avatar-action-btn" id="uploadAvatarButton">上传头像</button>
<button type="button" class="layui-btn page-secondary-btn avatar-action-btn" id="goChangePasswordBtn">修改密码</button>
</div>
<p class="avatar-tip">支持 jpg、jpeg、png、gif、webp 格式，不超过 2MB</p>
</article>
<div class="profile-grid" id="profileContainer"></div>
</section>

</section>
</div>
</div>
</div>
<script src="/js/layui.js?v=3"></script>
<script src="/js/common.js?v=3"></script>
<script>
layui.use(["layer"],function(){var layer=layui.layer;
var avatarFileInput=document.getElementById("avatarFile");
var avatarPreview=document.getElementById("avatarPreview");
var avatarName=document.getElementById("avatarName");
var uploadAvatarButton=document.getElementById("uploadAvatarButton");
var cachedUser=PlatformUtils.getCurrentUser();
var currentUser=null;

if(cachedUser){currentUser=cachedUser;renderProfile(cachedUser)}
loadCurrentUser();

uploadAvatarButton.addEventListener("click",function(){avatarFileInput.click()});

avatarFileInput.addEventListener("change",function(){
var f=avatarFileInput.files[0];
if(!f)return;
if(f.size>2*1024*1024){layer.msg("文件不能超过2MB",{icon:2});avatarFileInput.value="";return}
uploadAvatarButton.disabled=true;uploadAvatarButton.textContent="上传中...";
var fd=new FormData();fd.append("file",f);
fetch("/api/user/current/avatar",{method:"POST",body:fd})
.then(function(r){if(!r.ok)throw new Error("上传失败");return r.json()})
.then(function(d){renderAvatar(d.userHeader);avatarName.textContent="当前头像";if(currentUser)currentUser.userHeader=d.userHeader;layer.msg("头像更新成功",{icon:1})})
.catch(function(e){layer.msg(e.message||"上传失败",{icon:2})})
.finally(function(){uploadAvatarButton.disabled=false;uploadAvatarButton.textContent="上传头像";avatarFileInput.value=""})
});

function loadCurrentUser(){PlatformUtils.request("/api/user/current").then(function(d){currentUser=d;renderProfile(d)}).catch(function(e){layer.msg(e.message||"获取用户信息失败")})}

function renderProfile(d){
renderAvatar(d.userHeader);
avatarName.textContent=d.userHeader?"当前头像":"尚未设置头像";
document.getElementById("profileContainer").innerHTML=[
renderProfileCard("基本资料",[["用户名",d.userName||"--"],["姓名",d.userRealName||"--"],["邮箱",d.userEmail||"--"],["手机号",d.userPhone||"--"],["注册时间",d.createTime||"--"]]),
renderProfileCard("账户信息",[["角色",d.roleNames||"--"],["状态",d.userStatus===1?"正常":"禁用"],["最后登录",d.lastLoginTime||"--"]])
].join("");
}

function renderAvatar(u){avatarPreview.src=u||"/images/default-avatar.svg"}

function renderProfileCard(t,items){
return '<section class="profile-card"><h2>'+t+'</h2>'+items.map(function(i){
return '<div class="profile-item"><span>'+i[0]+'</span><strong>'+PlatformUtils.renderValue(i[1])+'</strong></div>';
}).join("")+'</section>';
}
});

document.getElementById("goChangePasswordBtn").addEventListener("click",function(){window.location.href="/pages/user/change-password.html"});
</script>
</body>
</html>
