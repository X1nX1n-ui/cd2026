<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威胁感知平台 - 后台管理</title>
    <link rel="stylesheet" href="https://cdn.staticfile.net/layui/2.9.13/css/layui.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-body">
<div class="layui-layout layui-layout-admin dashboard-layout">
    <div class="layui-header">
        <div class="brand-bar">
            <div class="brand-title">
                <span class="brand-mark">
                    <i data-lucide="shield"></i>
                </span>
                <span class="brand-text">
                    <strong>威胁感知平台</strong>
                    <span>后台管理中心</span>
                </span>
            </div>
            <div class="brand-actions">
                <span class="brand-user">当前用户：<strong id="currentUserName">--</strong></span>
                <button type="button" class="text-link-button" id="logoutButton">退出登录</button>
            </div>
        </div>
    </div>

    <div class="layui-side">
        <div class="layui-side-scroll">
            <p class="menu-section-title">功能导航</p>
            <ul class="layui-nav layui-nav-tree" lay-filter="sideNav" lay-shrink="all" id="menuTree"></ul>
        </div>
    </div>

    <div class="layui-body">
        <div class="workspace-shell">
            <div class="layui-tab app-tabs" lay-filter="mainTabs" lay-allowclose="true">
                <ul class="layui-tab-title"></ul>
                <div class="layui-tab-content"></div>
            </div>
        </div>
    </div>
</div>

<div class="tab-context-menu" id="tabContextMenu">
    <button type="button" data-action="closeCurrent">关闭当前</button>
    <button type="button" data-action="closeOthers">关闭其他</button>
    <button type="button" data-action="closeAll">关闭全部</button>
</div>

<script src="https://cdn.staticfile.net/layui/2.9.13/layui.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/index.js"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
