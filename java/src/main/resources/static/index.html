<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威胁感知平台 - 后台管理</title>
    <link rel="stylesheet" href="https://cdn.staticfile.net/layui/2.9.13/css/layui.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-body">
<div class="layui-layout layui-layout-admin dashboard-layout">
    <div class="layui-header">
        <div class="brand-bar">
            <div class="brand-title">
                <button type="button" class="sidebar-toggle-button" id="sidebarToggleButton" title="切换导航">
                    <i data-lucide="panel-left-open"></i>
                </button>
                <span class="brand-mark">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3 5 6v5c0 4.6 2.8 8.8 7 10 4.2-1.2 7-5.4 7-10V6l-7-3Z"></path>
                        <path d="M12 7.5v9"></path>
                        <path d="M8.75 11.25H15.25"></path>
                    </svg>
                </span>
                <span class="brand-text">
                    <strong>威胁感知平台</strong>
                    <span>控制台</span>
                </span>
            </div>
            <div class="brand-actions">
                <button type="button" class="brand-user-entry" id="profileEntryButton" title="查看个人信息">
                    <img id="currentUserAvatar" class="brand-user-avatar" src="/images/default-avatar.svg" alt="用户头像">
                    <span class="brand-user">当前用户 <strong id="currentUserName">--</strong></span>
                </button>
                <button type="button" class="text-link-button" id="logoutButton">退出登录</button>
            </div>
        </div>
    </div>

    <div class="layui-side">
        <div class="layui-side-scroll">
            <p class="menu-section-title">功能导航</p>
            <ul class="layui-nav layui-nav-tree" lay-filter="sideNav" lay-shrink="all" id="menuTree"></ul>
        </div>
    </div>

    <div class="layui-body">
        <div class="workspace-shell">
            <div class="layui-tab app-tabs" lay-filter="mainTabs" lay-allowclose="true">
                <div class="tab-strip-tools">
                    <button type="button" class="tab-strip-clear" id="clearTabsButton" title="清空全部标签页">清空</button>
                </div>
                <ul class="layui-tab-title"></ul>
                <div class="layui-tab-content"></div>
            </div>
        </div>
    </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="tab-context-menu" id="tabContextMenu">
    <button type="button" data-action="closeCurrent">关闭当前</button>
    <button type="button" data-action="closeOthers">关闭其他</button>
    <button type="button" data-action="closeAll">关闭全部</button>
</div>

<script src="https://cdn.staticfile.net/layui/2.9.13/layui.js"></script>
<script src="/vendor/lucide/lucide.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/index.js"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
