<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主机管理</title>
    <link rel="stylesheet" href="/css/layui.css?v=3">
    <link rel="stylesheet" href="/css/app.css?v=3">
</head>
<body class="app-body">
<div class="page-shell">
    <div class="page-section">
        <section class="page-heading">
            <div>
                <h1>主机管理 <span style="font-size:11px;color:#4f86f7;font-weight:400;">[v20260608]</span></h1>
                <p>实时展示主机在线状态，支持主机详情查看、资产明细弹窗与自动刷新。</p>
            </div>
        </section>

        <section class="page-filter host-page-filter">
            <form class="layui-form page-filter-form host-page-filter-form" id="searchForm">
                <div class="host-filter-main">
                    <div class="layui-inline host-keyword-field">
                        <div class="layui-input-inline">
                            <input type="text" name="keyword" placeholder="请输入主机名、IP、MAC 或系统名称" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <div class="layui-input-inline">
                            <select name="status">
                                <option value="">全部状态</option>
                                <option value="1">在线</option>
                                <option value="0">下线</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="layui-btn page-btn host-toolbar-btn">查询</button>
                </div>
                <div class="host-filter-tools">
                    <button type="button" class="layui-btn page-secondary-btn host-toolbar-btn" id="resetSearch">重置</button>
                    <button type="button" class="layui-btn page-secondary-btn host-toolbar-btn" id="refreshButton">刷新数据</button>
                    <div class="layui-form host-refresh-form host-toolbar-field">
                        <div class="layui-input-inline">
                            <select id="autoRefreshSelect">
                                <option value="0">不刷新</option>
                                <option value="1">1</option>
                                <option value="3">3</option>
                                <option value="5">5</option>
                            </select>
                        </div>
                    </div>
                    <div class="host-refresh-hint host-toolbar-field" id="refreshHint">当前为手动刷新模式</div>
                    <button type="button" class="layui-btn page-btn host-toolbar-btn" id="openProbeScheduleBtn" style="margin-left:8px;">探测策略</button>
                    <button type="button" class="layui-btn page-secondary-btn host-toolbar-btn" id="batchExportBtn" style="margin-left:8px;">导出资产清单</button>
                </div>
            </form>
        </section>

        <section class="page-table-card">
            <table id="hostTable" lay-filter="hostTable"></table>
        </section>
    </div>
</div>

<script src="/js/layui.js?v=3"></script>
<script src="/js/common.js?v=3"></script>
<script>
    layui.use(["table", "form", "layer"], function () {
        const table = layui.table;
        const form = layui.form;
        const layer = layui.layer;
        const searchForm = document.getElementById("searchForm");
        const resetSearch = document.getElementById("resetSearch");
        const refreshButton = document.getElementById("refreshButton");
        const autoRefreshSelect = document.getElementById("autoRefreshSelect");
        const refreshHint = document.getElementById("refreshHint");
        const canProbe = PlatformUtils.hasPermission("asset:host:view");
        const canUpdate = PlatformUtils.hasPermission("asset:host:update");
        const canDelete = PlatformUtils.hasPermission("asset:host:delete");
        const riskFilterLabels = {
            all: "全部",
            high: "高风险",
            medium: "中风险",
            low: "低风险",
            safe: "无风险"
        };
        const riskLevelMap = {
            "高": "high",
            "高风险": "high",
            "中": "medium",
            "中风险": "medium",
            "低": "low",
            "低风险": "low",
            "无": "safe",
            "无风险": "safe"
        };
        const assetTypeMap = {
            account: {
                label: "账号",
                primaryCountLabel: "账号数量",
                primarySectionTitle: "账号列表",
                secondaryCountLabel: "影子账号数量",
                secondarySectionTitle: "影子账号"
            },
            service: {
                label: "服务",
                primaryCountLabel: "服务数量",
                primarySectionTitle: "服务列表"
            },
            process: {
                label: "进程",
                primaryCountLabel: "进程数量",
                primarySectionTitle: "进程列表"
            },
            app: {
                label: "安装程序",
                primaryCountLabel: "安装程序数量",
                primarySectionTitle: "安装程序列表"
            }
        };

        let autoRefreshTimer = null;
        let currentExportTaskId = null;
        let exportPollTimer = null;
        let isReloading = false;
        let lastKnownPage = 1;

        init();

        function init() { console.log('[HOSTS] init() running, PlatformUtils:', typeof PlatformUtils, ', hasPermission:', (typeof PlatformUtils.hasPermission === 'function'));
            bindActions();
            renderTable();
            form.render();
        }

        function bindActions() {
            searchForm.addEventListener("submit", function (event) {
                event.preventDefault();
                reloadTable(true);
            });

            resetSearch.addEventListener("click", function () {
                searchForm.reset();
                autoRefreshSelect.value = "0";
                clearAutoRefresh();
                form.render("select");
                updateRefreshHint();
                reloadTable(true);
            });

            refreshButton.addEventListener("click", function () {
                reloadTable(false);
            });

            form.on("select", function (data) {
                if (data.elem && data.elem.id === "autoRefreshSelect") {
                    configureAutoRefresh(data.value);
                }
            });
        }

        function renderTable() { console.log('[HOSTS] renderTable starting, elem exists:', !!document.getElementById('hostTable'), ', token:', PlatformUtils.getToken().substring(0,8)+'...');
            table.render({
                elem: "#hostTable",
                id: "hostTable",
                url: "/api/hosts/page",
                method: "GET",
                headers: PlatformUtils.authHeaders(),
                page: true,
                limits: [10, 20, 30],
                limit: 10,
                where: getSearchParams(),
                even: true,
                skin: "line",
                request: {
                    pageName: "pageNo",
                    limitName: "pageSize"
                },
                parseData: function (result) {
                    return {
                        code: 0,
                        msg: "",
                        count: result.total || 0,
                        data: result.records || []
                    };
                },
                done: function (_, curr) {
                    lastKnownPage = curr || lastKnownPage || 1;
                    const tableView = document.querySelector("#hostTable + .layui-table-view");
                    if (tableView) {
                        tableView.classList.remove("host-table-refreshing");
                    }
                    isReloading = false;
                },
                cols: [[
                    {type: "checkbox"},
                    {field: "id", title: "ID", width: 80},
                    {field: "hostname", title: "主机名", minWidth: 180, templet: function (row) { return PlatformUtils.renderValue(row.hostname); }},
                    {field: "ipAddress", title: "主IP", minWidth: 160, templet: function (row) { return PlatformUtils.renderValue(row.ipAddress); }},
                    {field: "macAddress", title: "MAC", minWidth: 170, templet: function (row) { return PlatformUtils.renderValue(row.macAddress); }},
                    {field: "osName", title: "操作系统", minWidth: 180, templet: function (row) { return PlatformUtils.renderValue(row.osName || row.osDetail); }},
                    {field: "memoryUsage", title: "内存占用", minWidth: 150, templet: function (row) { return renderMemoryUsage(row); }},
                    {field: "status", title: "状态", width: 120, templet: function (row) { return PlatformUtils.renderHostStatus(row.status); }},
                    {title: "资产", minWidth: 188, templet: function (row) { return renderAssetActions(row); }},
                    {title: "操作", minWidth: 188, templet: function () { return renderActions(); }}
                ]]
            });

            table.on("tool(hostTable)", function (obj) {
                if (obj.event === "detail") {
                    openDetailDialog(obj.data.id);
                    return;
                }

                if (obj.event.indexOf("asset:") === 0) {
                    openAssetDialog(obj.data, obj.event.split(":")[1]);
                    return;
                }

                if (obj.event === "probe") {
                    openProbeDialog(obj.data);
                    return;
                }

                if (obj.event === "edit") {
                    openHostDialog("编辑主机", obj.data);
                    return;
                }

                if (obj.event === "delete") {
                    layer.confirm("确认删除当前主机吗？", {title: "删除主机"}, function (index) {
                        PlatformUtils.request("/api/hosts/" + obj.data.id, {method: "DELETE"})
                            .then(function () {
                                layer.close(index);
                                layer.msg("删除成功");
                                reloadTable(false);
                            })
                            .catch(function (error) {
                                layer.msg(error.message || "删除失败");
                            });
                    });
                }
            });
        }

        function reloadTable(resetPage) {
            if (isReloading) {
                return;
            }

            isReloading = true;
            const tableView = document.querySelector("#hostTable + .layui-table-view");
            if (tableView) {
                tableView.classList.add("host-table-refreshing");
            }
            table.reloadData("hostTable", {
                headers: PlatformUtils.authHeaders(),
                where: getSearchParams(),
                scrollPos: resetPage ? "reset" : "fixed",
                loading: false,
                page: {
                    curr: resetPage ? 1 : lastKnownPage
                }
            });
        }

        function getSearchParams() {
            return {
                keyword: searchForm.querySelector('input[name="keyword"]').value.trim(),
                status: searchForm.querySelector('select[name="status"]').value
            };
        }

        function renderActions() {
            const actions = [
                '<a class="layui-btn layui-btn-xs page-btn" lay-event="detail">详情</a>'
            ];
            if (canUpdate) {
                actions.push('<a class="layui-btn layui-btn-xs page-btn" lay-event="edit">编辑</a>');
            }
            if (canProbe) {
                actions.push('<a class="layui-btn layui-btn-xs page-btn" lay-event="probe">资产探测</a>');
            }
            if (canDelete) {
                actions.push('<a class="layui-btn layui-btn-xs page-secondary-btn" lay-event="delete">删除</a>');
            }
            return actions.length
                ? '<div class="host-table-action-grid host-table-action-grid-compact">' + actions.join("") + '</div>'
                : '<span class="table-empty-action">--</span>';
        }

        function renderAssetActions() {
            return '<div class="host-table-action-grid asset-action-grid">'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:account"><span>账号</span></a>'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:service"><span>服务</span></a>'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:process"><span>进程</span></a>'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:app"><span>App</span></a>'
                + '</div>';
        }

        function openProbeDialog(host) {
            if (String(host.status || "") !== "1" && String(host.status || "").toUpperCase() !== "ONLINE") {
                layer.msg("删除成功");
                return;
            }

            const dialogWidth = Math.min(window.innerWidth - 32, 720) + "px";
            layer.open({
                type: 1,
                title: "发起资产探测",
                area: [dialogWidth, "auto"],
                shadeClose: true,
                content: buildProbeDialog(host),
                success: function (layero, index) {
                    const rootElement = layero[0] || layero;
                    const submitButton = rootElement.querySelector(".probe-submit");
                    const cancelButton = rootElement.querySelector(".probe-cancel");

                    cancelButton.addEventListener("click", function () {
                        layer.close(index);
                    });

                    submitButton.addEventListener("click", function () {
                        const payload = {
                            account: rootElement.querySelector('input[name="account"]').checked ? 1 : 0,
                            service: rootElement.querySelector('input[name="service"]').checked ? 1 : 0,
                            process: rootElement.querySelector('input[name="process"]').checked ? 1 : 0,
                            app: rootElement.querySelector('input[name="app"]').checked ? 1 : 0,
                            type: "assets"
                        };

                        if (!payload.account && !payload.service && !payload.process && !payload.app) {
                            layer.msg("删除成功");
                            return;
                        }

                        PlatformUtils.request("/api/hosts/" + host.id + "/asset-probe", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(payload)
                        })
                            .then(function () {
                                layer.close(index);
                                layer.msg("删除成功");
                            })
                            .catch(function (error) {
                                layer.msg(error.message || "资产探测指令发送失败");
                            });
                    });
                }
            });
        }

        function buildProbeDialog(host) {
            return '<div class="asset-dialog-shell">'
                + '<section class="probe-host-summary">'
                + '<div class="probe-host-summary-title">' + PlatformUtils.escapeHtml(host.hostname || "未命名主机") + '</div>'
                + '<div class="probe-host-summary-meta">'
                + '<span>MAC：' + PlatformUtils.escapeHtml(host.macAddress || "--") + '</span>'
                + '<span>主IP：' + PlatformUtils.escapeHtml(host.ipAddress || "--") + '</span>'
                + '<span>状态：在线</span>'
                + '</div>'
                + '</section>'
                + '<div class="check-group probe-option-grid">'
                + renderProbeCheck("account", "账号", "包含本机账号与影子账号")
                + renderProbeCheck("service", "服务", "采集当前主机服务信息")
                + renderProbeCheck("process", "进程", "采集当前主机运行进程")
                + renderProbeCheck("app", "安装程序", "采集当前主机已安装软件")
                + '</div>'
                + '<div class="page-form-actions">'
                + '<button type="button" class="layui-btn page-secondary-btn probe-cancel">取消</button>'
                + '<button type="button" class="layui-btn page-btn probe-submit">发送探测指令</button>'
                + '</div>'
                + '</div>';
        }

        function renderProbeCheck(name, label, description) {
            return '<label class="check-item probe-check-item">'
                + '<input type="checkbox" name="' + PlatformUtils.escapeHtml(name) + '" checked>'
                + '<span>' + PlatformUtils.escapeHtml(label) + '</span>'
                + '<em>' + PlatformUtils.escapeHtml(description) + '</em>'
                + '</label>';
        }

        

        // ===========================================
        //  探测策略调度配置
        // ===========================================
        var scheduleDialogIndex = null;
        var scheduleConfig = null;
        var scheduleHostCache = [];

        document.getElementById("openProbeScheduleBtn").addEventListener("click", function () {
            openProbeScheduleDialog();
        });

        function openProbeScheduleDialog() {
            Promise.all([
                PlatformUtils.request("/api/probe-schedule", { method: "GET" }),
                PlatformUtils.request("/api/hosts/page?status=1&pageSize=200", { method: "GET" })
            ]).then(function (results) {
                scheduleConfig = results[0];
                var hostPage = results[1];
                scheduleHostCache = hostPage.rows || hostPage.data || [];
                renderScheduleDialog();
            }).catch(function (error) {
                layer.msg("加载探测策略失败：" + (error.message || "未知错误"));
            });
        }

        function renderScheduleDialog() {
            var config = scheduleConfig;
            var enabled = config.enabled === true || config.enabled === 1;
            var cronExpr = config.cronExpression || "0 */5 * * * ?";
            var targetType = config.targetType || "all_online";
            var selectedIds = parseSelectedHostIds(config.targetHostIds);

            var html = '<div class="schedule-dialog-shell">'
                + '<div class="schedule-section">'
                + '<div class="schedule-section-title">策略状态</div>'
                + '<label class="schedule-toggle">'
                + '<input type="checkbox" id="scheduleEnabled" ' + (enabled ? 'checked' : '') + '>'
                + '<span class="schedule-toggle-track"></span>'
                + '<span class="schedule-toggle-label">' + (enabled ? '自动探测已开启' : '自动探测已关闭') + '</span>'
                + '</label>'
                + '</div>'
                + '<div class="schedule-section">'
                + '<div class="schedule-section-title">执行周期</div>'
                + '<div class="schedule-cron-presets" id="cronPresets">'
                + buildCronPreset("每5分钟", "0 */5 * * * ?", cronExpr)
                + buildCronPreset("每15分钟", "0 */15 * * * ?", cronExpr)
                + buildCronPreset("每30分钟", "0 */30 * * * ?", cronExpr)
                + buildCronPreset("每1小时", "0 0 */1 * * ?", cronExpr)
                + buildCronPreset("每2小时", "0 0 */2 * * ?", cronExpr)
                + buildCronPreset("每6小时", "0 0 */6 * * ?", cronExpr)
                + buildCronPreset("每12小时", "0 0 */12 * * ?", cronExpr)
                + buildCronPreset("自定义", "__custom__", cronExpr, true)
                + '</div>'
                + '<div class="schedule-cron-custom" id="cronCustomRow" style="display:' + (isCustomCron(cronExpr) ? 'flex' : 'none') + ';">'
                + '<div style="flex:1;display:flex;flex-direction:column;gap:6px;">'
                + '<input type="text" id="cronHumanInput" value="' + PlatformUtils.escapeHtml(cronToHuman(cronExpr)) + '" placeholder="例如：每10分钟 / 每3小时 / 每天8:30">'
                + '<input type="text" id="cronRawInput" value="' + PlatformUtils.escapeHtml(cronExpr) + '" placeholder="Cron" style="display:none;font-family:monospace;font-size:12px;color:#888;">'
                + '<a href="#" id="cronAdvancedToggle" style="font-size:11px;color:#999;text-decoration:none;">高级模式</a>'
                + '</div>'
                + '</div>'
                + '<div class="schedule-cron-hint"><strong>' + cronToHuman(cronExpr) + '</strong></div>'
                + '</div>'
                + '<div class="schedule-section">'
                + '<div class="schedule-section-title">目标主机</div>'
                + '<div style="margin-bottom:8px;">'
                + '<label style="margin-right:20px;cursor:pointer;"><input type="radio" name="targetType" value="all_online" ' + (targetType === "all_online" ? 'checked' : '') + '> 全部在线主机</label>'
                + '<label style="cursor:pointer;"><input type="radio" name="targetType" value="selected" ' + (targetType === "selected" ? 'checked' : '') + '> 指定主机</label>'
                + '</div>'
                + '<div class="schedule-host-chips" id="hostChips" style="display:' + (targetType === "selected" ? 'flex' : 'none') + ';">'
                + buildHostChips(selectedIds)
                + '</div>'
                + '</div>'
                + '<div class="schedule-section">'
                + '<div class="schedule-section-title">探测资产类型</div>'
                + '<div class="schedule-option-grid">'
                + buildAssetOption("account", "账号", "本机账号与影子账号", config.probeAccount)
                + buildAssetOption("service", "服务", "主机服务信息", config.probeService)
                + buildAssetOption("process", "进程", "运行进程", config.probeProcess)
                + buildAssetOption("app", "安装程序", "已安装软件", config.probeApp)
                + '</div>'
                + '</div>'
                + '<div class="schedule-dialog-footer">'
                + '<div class="left-actions">'
                + '<button type="button" class="layui-btn layui-btn-sm page-secondary-btn" id="executeNowBtn" style="min-width:110px;">立即执行一次</button>'
                + '</div>'
                + '<div style="display:flex;gap:8px;">'
                + '<button type="button" class="layui-btn layui-btn-sm page-secondary-btn" id="scheduleCancelBtn" style="min-width:80px;">取消</button>'
                + '<button type="button" class="layui-btn layui-btn-sm page-secondary-btn" id="scheduleSaveBtn" style="min-width:100px;">保存配置</button>'
                + '</div>'
                + '</div>'
                + '</div>';

            scheduleDialogIndex = layer.open({
                type: 1,
                title: "探测策略配置",
                area: ["600px", "auto"],
                shadeClose: true,
                content: html,
                success: function (layero) { bindScheduleDialogEvents(layero); },
                cancel: function () { scheduleDialogIndex = null; }
            });
        }

        
        function humanToCron(text) {
            if (!text) return '';
            var t = text.trim();
            if (/^[0-9*\/,?\-]+(\s+[0-9*\/,?\-]+){4,5}$/.test(t)) return t;
            var cn = {"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"十":10,"零":0,"两":2,"半":30};
            t = t.replace(/[一二三四五六七八九十两零半]+/g, function(m) { return cn[m] || m; });
            var nums = t.match(/\d+/g);
            if (!nums) return '';
            if (/[\u5206]|min/i.test(t) && !/[\u5c0f\u65f6]|[\u65f6](?!\u95f4)|[\u70b9]|[\u5929]|[\u65e5]/i.test(t)) {
                return '0 */' + nums[0] + ' * * * ?';
            }
            if (/[\u5c0f\u65f6]|[\u65f6](?!\u95f4)/i.test(t) && !/[\u5929]|[\u65e5]/i.test(t)) {
                var mm = nums.length > 1 ? nums[1] : '0';
                return '0 ' + mm + ' */' + nums[0] + ' * * ?';
            }
            if (/[\u5929]|[\u65e5]/i.test(t)) {
                var intv = '1';
                var m1 = t.match(/\u6bcf.*?(\d+).*?[\u5929]/);
                if (m1) intv = m1[1];
                var hh = nums.length > 1 ? nums[nums.length-2] : '0';
                var mm2 = nums.length > 2 ? nums[nums.length-1] : '0';
                if (intv === '1') return '0 ' + mm2 + ' ' + hh + ' * * ?';
                return '0 ' + mm2 + ' ' + hh + ' */' + intv + ' * ?';
            }
            if (/:/.test(t) && nums.length >= 2) {
                var parts = t.split(':');
                return '0 ' + parts[1].replace(/\D/g,'') + ' ' + parts[0].replace(/\D/g,'') + ' * * ?';
            }
            return '';
        }

        function cronToHuman(cron) {
            if (!cron) return "未设置";
            var parts = cron.trim().split(/\s+/);
            if (parts.length < 6) return cron;
            var sec = parts[0], min = parts[1], hour = parts[2], day = parts[3], mon = parts[4];
            if (sec === "0" && min.startsWith("*/") && hour === "*" && day === "*" && mon === "*") {
                return "每" + min.slice(2) + "分钟自动探测一次";
            }
            if (sec === "0" && min === "0" && hour.startsWith("*/") && day === "*" && mon === "*") {
                return "每" + hour.slice(2) + "小时自动探测一次";
            }
            if (sec === "0" && !min.includes("/") && !min.includes(",") && !hour.includes("/") && !hour.includes(",") && day === "*" && mon === "*") {
                return "每天 " + hour + ":" + (min.length === 1 ? "0" + min : min) + " 自动探测一次";
            }
            if (sec === "0" && day.startsWith("*/") && mon === "*") {
                return "每" + day.slice(2) + "天 " + hour + ":" + (min.length === 1 ? "0" + min : min) + " 自动探测一次";
            }
            var desc = [];
            if (min.startsWith("*/")) desc.push("每" + min.slice(2) + "分钟");
            else if (min !== "*" && min !== "0") desc.push("第" + min + "分");
            if (hour.startsWith("*/")) desc.push("每" + hour.slice(2) + "小时");
            else if (hour !== "*") desc.push(hour + "时");
            if (day.startsWith("*/")) desc.push("每" + day.slice(2) + "天");
            if (desc.length > 0) return desc.join("") + "自动探测一次";
            return cron;
        }

        function startBatchExport(root, dlgIdx, selectedHosts) {
            var types = [];

            });
            if (types.length === 0) { layer.msg("请至少选择一种资产类型"); return; }
            var format = root.querySelector('input[name="expFormat"]:checked').value;
            var hostIds = selectedHosts.map(function (h) { return h.id; });

            var startBtn = root.querySelector("#exportStartBtn");
            var cancelBtn = root.querySelector("#exportCancelBtn");
            var bar = root.querySelector("#exportProgressBar");
            var fill = root.querySelector("#exportProgressFill");

            startBtn.disabled = true;
            cancelBtn.disabled = true;
            bar.style.display = "block";
            fill.style.width = "5%";
            text.textContent = "正在提交导出任务...";

            PlatformUtils.request("/api/assets/export/batch", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ hostIds: hostIds, assetTypes: types, format: format })
            }).then(function (task) {
                exportTaskId = task.taskId;
                pollBatchExport(task.taskId, fill, text, dlgIdx, root);
            }).catch(function (err) {
                bar.style.display = "none";

        function pollBatchExport(taskId, fill, text, dlgIdx, root) {
            exportPollTimer = setInterval(function () {
                PlatformUtils.request("/api/assets/export/" + taskId).then(function (task) {
                    fill.style.width = (task.progress || 0) + "%";
                    text.textContent = task.message || "";
                    if (task.status === "COMPLETED") {
                        clearInterval(exportPollTimer);
                        layer.close(dlgIdx);
                        fetch("/api/assets/export/" + task.taskId + "/download", { headers: PlatformUtils.authHeaders() })
                            .then(function (r) { return r.blob(); })
                            .then(function (blob) {
                                var a = document.createElement("a");
                                a.href = URL.createObjectURL(blob);
                                a.download = task.fileName || "export";
                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);
                                layer.msg("导出完成，共 " + task.totalRecords + " 条记录", { icon: 1 });
                            }).catch(function () { layer.msg("下载失败"); });
                    } else if (task.status === "FAILED") {
                        clearInterval(exportPollTimer);
                        text.textContent = task.message || "导出失败";
                        root.querySelector("#exportStartBtn").disabled = false;
                        root.querySelector("#exportCancelBtn").disabled = false;
                        layer.msg(task.message || "导出失败");
                    }
                }).catch(function () {});
            }, 1000);
        }

        function renderMemoryUsage(row) {
            const available = parseMemoryValue(row.memoryAvailable);
            const total = parseMemoryValue(row.memoryTotal);
            if (!available || !total || total.value <= 0 || available.unit !== total.unit) {
                return PlatformUtils.renderValue(row.memoryAvailable && row.memoryTotal
                    ? row.memoryAvailable + " / " + row.memoryTotal
                    : "--");
            }

            const used = Math.max(total.value - available.value, 0);
            const percent = Math.min(Math.max((used / total.value) * 100, 0), 100);
            return '<div class="memory-usage-cell">'
                + '<div class="memory-usage-meta">'
                + '<span>' + PlatformUtils.escapeHtml(used.toFixed(2) + " " + total.unit) + '</span>'
                + '<span>' + PlatformUtils.escapeHtml(percent.toFixed(0) + "%") + '</span>'
                + '</div>'
                + '<div class="memory-usage-track"><span style="width:' + percent.toFixed(2) + '%;"></span></div>'
                + '</div>';
        }

        function parseMemoryValue(value) {
            if (!value) {
                return null;
            }
            const match = String(value).trim().match(/^([0-9]+(?:\.[0-9]+)?)\s*([A-Za-z]+)$/);
            if (!match) {
                return null;
            }
            return {
                value: Number(match[1]),
                unit: match[2].toUpperCase()
            };
        }
