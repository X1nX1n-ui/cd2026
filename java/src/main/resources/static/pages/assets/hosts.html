<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主机管理</title>
    <link rel="stylesheet" href="https://cdn.staticfile.net/layui/2.9.13/css/layui.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-body">
<div class="page-shell">
    <div class="page-section">
        <section class="page-heading">
            <div>
                <h1>主机管理</h1>
                <p>实时展示主机在线状态，支持主机详情查看、资产明细弹窗与自动刷新。</p>
            </div>
        </section>

        <section class="page-filter host-page-filter">
            <form class="layui-form page-filter-form host-page-filter-form" id="searchForm">
                <div class="host-filter-main">
                    <div class="layui-inline host-keyword-field">
                        <div class="layui-input-inline">
                            <input type="text" name="keyword" placeholder="请输入主机名、IP、MAC 或系统名称" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <div class="layui-input-inline">
                            <select name="status">
                                <option value="">全部状态</option>
                                <option value="1">在线</option>
                                <option value="0">下线</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="layui-btn page-btn host-toolbar-btn">查询</button>
                </div>
                <div class="host-filter-tools">
                    <button type="button" class="layui-btn page-secondary-btn host-toolbar-btn" id="resetSearch">重置</button>
                    <button type="button" class="layui-btn page-secondary-btn host-toolbar-btn" id="refreshButton">刷新数据</button>
                    <div class="layui-form host-refresh-form host-toolbar-field">
                        <div class="layui-input-inline">
                            <select id="autoRefreshSelect">
                                <option value="0">不刷新</option>
                                <option value="1">1秒</option>
                                <option value="3">3秒</option>
                                <option value="5">5秒</option>
                            </select>
                        </div>
                    </div>
                    <div class="host-refresh-hint host-toolbar-field" id="refreshHint">当前为手动刷新模式</div>
                </div>
            </form>
        </section>

        <section class="page-table-card">
            <table id="hostTable" lay-filter="hostTable"></table>
        </section>
    </div>
</div>

<script src="https://cdn.staticfile.net/layui/2.9.13/layui.js"></script>
<script src="/js/common.js"></script>
<script>
    layui.use(["table", "form", "layer"], function () {
        const table = layui.table;
        const form = layui.form;
        const layer = layui.layer;
        const searchForm = document.getElementById("searchForm");
        const resetSearch = document.getElementById("resetSearch");
        const refreshButton = document.getElementById("refreshButton");
        const autoRefreshSelect = document.getElementById("autoRefreshSelect");
        const refreshHint = document.getElementById("refreshHint");
        const canProbe = PlatformUtils.hasPermission("asset:host:view");
        const canUpdate = PlatformUtils.hasPermission("asset:host:update");
        const canDelete = PlatformUtils.hasPermission("asset:host:delete");
        const riskFilterLabels = {
            all: "全部",
            high: "高风险",
            medium: "中风险",
            low: "低风险",
            safe: "无风险"
        };
        const riskLevelMap = {
            "高": "high",
            "高风险": "high",
            "中": "medium",
            "中风险": "medium",
            "低": "low",
            "低风险": "low",
            "无": "safe",
            "无风险": "safe"
        };
        const assetTypeMap = {
            account: {
                label: "账号",
                primaryCountLabel: "账号数量",
                primarySectionTitle: "账号列表",
                secondaryCountLabel: "影子账号数量",
                secondarySectionTitle: "影子账号"
            },
            service: {
                label: "服务",
                primaryCountLabel: "服务数量",
                primarySectionTitle: "服务列表"
            },
            process: {
                label: "进程",
                primaryCountLabel: "进程数量",
                primarySectionTitle: "进程列表"
            },
            app: {
                label: "安装程序",
                primaryCountLabel: "安装程序数量",
                primarySectionTitle: "安装程序列表"
            }
        };

        let autoRefreshTimer = null;
        let isReloading = false;
        let lastKnownPage = 1;

        init();

        function init() {
            bindActions();
            renderTable();
            form.render();
        }

        function bindActions() {
            searchForm.addEventListener("submit", function (event) {
                event.preventDefault();
                reloadTable(true);
            });

            resetSearch.addEventListener("click", function () {
                searchForm.reset();
                autoRefreshSelect.value = "0";
                clearAutoRefresh();
                form.render("select");
                updateRefreshHint();
                reloadTable(true);
            });

            refreshButton.addEventListener("click", function () {
                reloadTable(false);
            });

            form.on("select", function (data) {
                if (data.elem && data.elem.id === "autoRefreshSelect") {
                    configureAutoRefresh(data.value);
                }
            });
        }

        function renderTable() {
            table.render({
                elem: "#hostTable",
                id: "hostTable",
                url: "/api/hosts/page",
                method: "GET",
                headers: PlatformUtils.authHeaders(),
                page: true,
                limits: [10, 20, 30],
                limit: 10,
                where: getSearchParams(),
                even: true,
                skin: "line",
                request: {
                    pageName: "pageNo",
                    limitName: "pageSize"
                },
                parseData: function (result) {
                    return {
                        code: 0,
                        msg: "",
                        count: result.total || 0,
                        data: result.records || []
                    };
                },
                done: function (_, curr) {
                    lastKnownPage = curr || lastKnownPage || 1;
                    const tableView = document.querySelector("#hostTable + .layui-table-view");
                    if (tableView) {
                        tableView.classList.remove("host-table-refreshing");
                    }
                    isReloading = false;
                },
                cols: [[
                    {field: "id", title: "ID", width: 80},
                    {field: "hostname", title: "主机名", minWidth: 180, templet: function (row) { return PlatformUtils.renderValue(row.hostname); }},
                    {field: "ipAddress", title: "主IP", minWidth: 160, templet: function (row) { return PlatformUtils.renderValue(row.ipAddress); }},
                    {field: "macAddress", title: "MAC", minWidth: 170, templet: function (row) { return PlatformUtils.renderValue(row.macAddress); }},
                    {field: "osName", title: "操作系统", minWidth: 180, templet: function (row) { return PlatformUtils.renderValue(row.osName || row.osDetail); }},
                    {field: "memoryUsage", title: "内存占用", minWidth: 150, templet: function (row) { return renderMemoryUsage(row); }},
                    {field: "status", title: "状态", width: 120, templet: function (row) { return PlatformUtils.renderHostStatus(row.status); }},
                    {title: "资产", minWidth: 188, templet: function (row) { return renderAssetActions(row); }},
                    {title: "操作", minWidth: 188, templet: function () { return renderActions(); }}
                ]]
            });

            table.on("tool(hostTable)", function (obj) {
                if (obj.event === "detail") {
                    openDetailDialog(obj.data.id);
                    return;
                }

                if (obj.event.indexOf("asset:") === 0) {
                    openAssetDialog(obj.data, obj.event.split(":")[1]);
                    return;
                }

                if (obj.event === "probe") {
                    openProbeDialog(obj.data);
                    return;
                }

                if (obj.event === "edit") {
                    openHostDialog("编辑主机", obj.data);
                    return;
                }

                if (obj.event === "delete") {
                    layer.confirm("确认删除当前主机吗？", {title: "删除主机"}, function (index) {
                        PlatformUtils.request("/api/hosts/" + obj.data.id, {method: "DELETE"})
                            .then(function () {
                                layer.close(index);
                                layer.msg("删除成功");
                                reloadTable(false);
                            })
                            .catch(function (error) {
                                layer.msg(error.message || "删除失败");
                            });
                    });
                }
            });
        }

        function reloadTable(resetPage) {
            if (isReloading) {
                return;
            }

            isReloading = true;
            const tableView = document.querySelector("#hostTable + .layui-table-view");
            if (tableView) {
                tableView.classList.add("host-table-refreshing");
            }
            table.reloadData("hostTable", {
                headers: PlatformUtils.authHeaders(),
                where: getSearchParams(),
                scrollPos: resetPage ? "reset" : "fixed",
                loading: false,
                page: {
                    curr: resetPage ? 1 : lastKnownPage
                }
            });
        }

        function getSearchParams() {
            return {
                keyword: searchForm.querySelector('input[name="keyword"]').value.trim(),
                status: searchForm.querySelector('select[name="status"]').value
            };
        }

        function renderActions() {
            const actions = [
                '<a class="layui-btn layui-btn-xs page-btn" lay-event="detail">详情</a>'
            ];
            if (canUpdate) {
                actions.push('<a class="layui-btn layui-btn-xs page-btn" lay-event="edit">编辑</a>');
            }
            if (canProbe) {
                actions.push('<a class="layui-btn layui-btn-xs page-btn" lay-event="probe">资产探测</a>');
            }
            if (canDelete) {
                actions.push('<a class="layui-btn layui-btn-xs page-secondary-btn" lay-event="delete">删除</a>');
            }
            return actions.length
                ? '<div class="host-table-action-grid host-table-action-grid-compact">' + actions.join("") + '</div>'
                : '<span class="table-empty-action">--</span>';
        }

        function renderAssetActions() {
            return '<div class="host-table-action-grid asset-action-grid">'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:account"><span>账号</span></a>'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:service"><span>服务</span></a>'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:process"><span>进程</span></a>'
                + '<a class="layui-btn layui-btn-xs page-btn asset-action-btn" lay-event="asset:app"><span>App</span></a>'
                + '</div>';
        }

        function openProbeDialog(host) {
            if (String(host.status || "") !== "1" && String(host.status || "").toUpperCase() !== "ONLINE") {
                layer.msg("仅在线主机支持发起资产探测");
                return;
            }

            const dialogWidth = Math.min(window.innerWidth - 32, 720) + "px";
            layer.open({
                type: 1,
                title: "发起资产探测",
                area: [dialogWidth, "auto"],
                shadeClose: true,
                content: buildProbeDialog(host),
                success: function (layero, index) {
                    const rootElement = layero[0] || layero;
                    const submitButton = rootElement.querySelector(".probe-submit");
                    const cancelButton = rootElement.querySelector(".probe-cancel");

                    cancelButton.addEventListener("click", function () {
                        layer.close(index);
                    });

                    submitButton.addEventListener("click", function () {
                        const payload = {
                            account: rootElement.querySelector('input[name="account"]').checked ? 1 : 0,
                            service: rootElement.querySelector('input[name="service"]').checked ? 1 : 0,
                            process: rootElement.querySelector('input[name="process"]').checked ? 1 : 0,
                            app: rootElement.querySelector('input[name="app"]').checked ? 1 : 0,
                            type: "assets"
                        };

                        if (!payload.account && !payload.service && !payload.process && !payload.app) {
                            layer.msg("请至少选择一个探测模块");
                            return;
                        }

                        PlatformUtils.request("/api/hosts/" + host.id + "/asset-probe", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(payload)
                        })
                            .then(function () {
                                layer.close(index);
                                layer.msg("资产探测指令已发送到队列");
                            })
                            .catch(function (error) {
                                layer.msg(error.message || "资产探测指令发送失败");
                            });
                    });
                }
            });
        }

        function buildProbeDialog(host) {
            return '<div class="asset-dialog-shell">'
                + '<section class="probe-host-summary">'
                + '<div class="probe-host-summary-title">' + PlatformUtils.escapeHtml(host.hostname || "未命名主机") + '</div>'
                + '<div class="probe-host-summary-meta">'
                + '<span>MAC：' + PlatformUtils.escapeHtml(host.macAddress || "--") + '</span>'
                + '<span>主IP：' + PlatformUtils.escapeHtml(host.ipAddress || "--") + '</span>'
                + '<span>状态：在线</span>'
                + '</div>'
                + '</section>'
                + '<div class="check-group probe-option-grid">'
                + renderProbeCheck("account", "账号", "包含本机账号与影子账号")
                + renderProbeCheck("service", "服务", "采集当前主机服务信息")
                + renderProbeCheck("process", "进程", "采集当前主机运行进程")
                + renderProbeCheck("app", "安装程序", "采集当前主机已安装软件")
                + '</div>'
                + '<div class="page-form-actions">'
                + '<button type="button" class="layui-btn page-secondary-btn probe-cancel">取消</button>'
                + '<button type="button" class="layui-btn page-btn probe-submit">发送探测指令</button>'
                + '</div>'
                + '</div>';
        }

        function renderProbeCheck(name, label, description) {
            return '<label class="check-item probe-check-item">'
                + '<input type="checkbox" name="' + PlatformUtils.escapeHtml(name) + '" checked>'
                + '<span>' + PlatformUtils.escapeHtml(label) + '</span>'
                + '<em>' + PlatformUtils.escapeHtml(description) + '</em>'
                + '</label>';
        }

        function configureAutoRefresh(value) {
            clearAutoRefresh();
            const seconds = Number(value || 0);
            updateRefreshHint(seconds);
            if (seconds <= 0) {
                return;
            }

            autoRefreshTimer = window.setInterval(function () {
                reloadTable(false);
            }, seconds * 1000);
        }

        function clearAutoRefresh() {
            if (autoRefreshTimer) {
                window.clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }

        function updateRefreshHint(seconds) {
            if (!seconds) {
                refreshHint.textContent = "当前为手动刷新模式";
                return;
            }
            refreshHint.textContent = "列表每 " + seconds + " 秒自动刷新一次";
        }

        function renderMemoryUsage(row) {
            const available = parseMemoryValue(row.memoryAvailable);
            const total = parseMemoryValue(row.memoryTotal);
            if (!available || !total || total.value <= 0 || available.unit !== total.unit) {
                return PlatformUtils.renderValue(row.memoryAvailable && row.memoryTotal
                    ? row.memoryAvailable + " / " + row.memoryTotal
                    : "--");
            }

            const used = Math.max(total.value - available.value, 0);
            const percent = Math.min(Math.max((used / total.value) * 100, 0), 100);
            return '<div class="memory-usage-cell">'
                + '<div class="memory-usage-meta">'
                + '<span>' + PlatformUtils.escapeHtml(used.toFixed(2) + " " + total.unit) + '</span>'
                + '<span>' + PlatformUtils.escapeHtml(percent.toFixed(0) + "%") + '</span>'
                + '</div>'
                + '<div class="memory-usage-track"><span style="width:' + percent.toFixed(2) + '%;"></span></div>'
                + '</div>';
        }

        function parseMemoryValue(value) {
            if (!value) {
                return null;
            }
            const match = String(value).trim().match(/^([0-9]+(?:\.[0-9]+)?)\s*([A-Za-z]+)$/);
            if (!match) {
                return null;
            }
            return {
                value: Number(match[1]),
                unit: match[2].toUpperCase()
            };
        }

        function openDetailDialog(hostId) {
            PlatformUtils.request("/api/hosts/" + hostId)
                .then(function (host) {
                    const dialogWidth = Math.min(window.innerWidth - 32, 980) + "px";
                    layer.open({
                        type: 1,
                        title: "主机详情",
                        area: [dialogWidth, "auto"],
                        shadeClose: true,
                        content: buildHostDetail(host)
                    });
                })
                .catch(function (error) {
                    layer.msg(error.message || "获取主机详情失败");
                });
        }

        function buildHostDetail(host) {
            const baseItems = [
                renderDetailItem("ID", host.id),
                renderDetailItem("主机名", host.hostname),
                renderDetailItem("主IP", host.ipAddress),
                renderDetailItem("MAC", host.macAddress),
                renderDetailItem("状态", PlatformUtils.renderHostStatus(host.status), true),
                renderDetailItem("操作系统", host.osName),
                renderDetailItem("系统类型", host.osType),
                renderDetailItem("系统版本", host.osVersion),
                renderDetailItem("系统详情", host.osDetail),
                renderDetailItem("CPU 架构", host.cpuArchitecture),
                renderDetailItem("CPU 名称", host.cpuName),
                renderDetailItem("逻辑核心", host.logicalCores),
                renderDetailItem("可用内存", host.memoryAvailable),
                renderDetailItem("总内存", host.memoryTotal),
                renderDetailItem("最后上报时间", PlatformUtils.formatDateTime(host.lastSeenAt)),
                renderDetailItem("更新时间", PlatformUtils.formatDateTime(host.updatedAt)),
                renderDetailItem("创建时间", PlatformUtils.formatDateTime(host.createdAt)),
                renderDetailItem("来源队列", host.sourceQueue)
            ];

            return '<div class="host-detail-panel">'
                + '<div class="host-detail-hero">'
                + '<div>'
                + '<h2>' + PlatformUtils.escapeHtml(host.hostname || "未命名主机") + '</h2>'
                + '<p>' + PlatformUtils.escapeHtml(host.ipAddress || "--") + " / " + PlatformUtils.escapeHtml(host.macAddress || "--") + '</p>'
                + '</div>'
                + '<div>' + PlatformUtils.renderHostStatus(host.status) + '</div>'
                + '</div>'
                + '<div class="host-detail-grid">' + baseItems.join("") + '</div>'
                + '<div class="host-detail-raw">'
                + '<div class="host-detail-section-title">原始上报数据</div>'
                + '<pre>' + PlatformUtils.escapeHtml(host.rawPayload || "--") + '</pre>'
                + '</div>'
                + '</div>';
        }

        function renderDetailItem(label, value, isStatus) {
            return '<div class="host-detail-item">'
                + '<span>' + PlatformUtils.escapeHtml(label) + '</span>'
                + '<strong>' + (isStatus ? value : PlatformUtils.renderValue(value)) + '</strong>'
                + '</div>';
        }

        function openAssetDialog(host, assetType) {
            const assetMeta = assetTypeMap[assetType];
            if (!assetMeta) {
                layer.msg("暂不支持该资产类型");
                return;
            }

            const loadingIndex = layer.load(1, {shade: [0.08, "#000"]});
            PlatformUtils.request("/api/hosts/" + host.id + "/asset-history/" + assetType)
                .then(function (history) {
                    layer.close(loadingIndex);
                    const snapshots = Array.isArray(history) ? history : [];
                    const dialogWidth = Math.min(window.innerWidth - 32, 1360) + "px";
                    layer.open({
                        type: 1,
                        title: assetMeta.label + "资产记录",
                        area: [dialogWidth, "84vh"],
                        shadeClose: true,
                        maxmin: true,
                        content: buildAssetHistoryDialog(host, snapshots, assetType, assetMeta),
                        success: function (layero) {
                            const rootElement = layero[0] || layero;
                            bindAssetHistoryDialog(rootElement, host, snapshots, assetMeta);
                        }
                    });
                })
                .catch(function (error) {
                    layer.close(loadingIndex);
                    layer.msg(error.message || "获取资产详情失败");
                });
        }

        function buildAssetHistoryDialog(host, snapshots, assetType, assetMeta) {
            const defaultSnapshot = snapshots[0] || null;
            return '<div class="asset-history-shell"'
                + ' data-host-id="' + PlatformUtils.escapeHtml(String(host.id)) + '"'
                + ' data-asset-type="' + PlatformUtils.escapeHtml(assetType) + '">'
                + '<section class="asset-record-header">'
                + '<div class="asset-record-header-main">'
                + '<div class="asset-record-header-tag">' + PlatformUtils.escapeHtml(assetMeta.label) + ' 历史记录</div>'
                + '<h3>' + PlatformUtils.escapeHtml(assetMeta.label) + '记录查看</h3>'
                + '<p>主机名：' + PlatformUtils.escapeHtml(host.hostname || "--") + '</p>'
                + '<p>MAC：' + PlatformUtils.escapeHtml(host.macAddress || "--") + '</p>'
                + '</div>'
                + '<div class="asset-record-header-note">'
                + '<strong>查看方式</strong>'
                + '<span>单击左侧历史记录可查看详情，勾选两条记录后可并排对比。</span>'
                + '</div>'
                + '</section>'
                + '<section class="asset-history-toolbar">'
                + '<div class="asset-history-toolbar-copy">'
                + '<strong>共找到 ' + snapshots.length + ' 条' + PlatformUtils.escapeHtml(assetMeta.label) + '历史记录</strong>'
                + '<span>单击左侧记录查看详情，勾选两条记录后可以并排对比差异。</span>'
                + '</div>'
                + '<div class="asset-history-toolbar-actions">'
                + '<button type="button" class="layui-btn page-btn asset-ai-analyze-trigger">AI辅助分析</button>'
                + '<button type="button" class="layui-btn page-btn asset-compare-trigger" disabled>对比选中记录</button>'
                + '<button type="button" class="layui-btn page-secondary-btn asset-compare-cancel" style="display:none;">退出对比</button>'
                + '</div>'
                + '<div class="asset-ai-progress" style="display:none;">'
                + '<div class="asset-ai-progress-track"><span class="asset-ai-progress-bar" style="width:0%;"></span></div>'
                + '<div class="asset-ai-progress-text">准备开始分析...</div>'
                + '</div>'
                + '</section>'
                + '<section class="asset-history-layout">'
                + '<aside class="asset-history-list">'
                + (snapshots.length ? snapshots.map(function (snapshot, index) {
                    return renderHistoryItem(snapshot, index, assetMeta);
                }).join("") : '<div class="asset-history-empty">当前没有历史记录</div>')
                + '</aside>'
                + '<div class="asset-history-stage">'
                + '<div class="asset-history-stage-content">'
                + (defaultSnapshot ? buildAssetSnapshotView(host, defaultSnapshot, assetMeta) : '<div class="asset-history-empty">请选择一条记录查看详情</div>')
                + '</div>'
                + '</div>'
                + '</section>'
                + '</div>';
        }

        function renderHistoryItem(snapshot, index, assetMeta) {
            const updatedAt = PlatformUtils.formatDateTime(snapshot.updatedAt);
            const createdAt = PlatformUtils.formatDateTime(snapshot.createdAt);
            const metrics = [
                renderHistoryMetric(assetMeta.primaryCountLabel, snapshot.primaryCount)
            ];
            if (assetMeta.secondaryCountLabel) {
                metrics.push(renderHistoryMetric(assetMeta.secondaryCountLabel, snapshot.secondaryCount));
            }
            return '<article class="asset-history-item' + (index === 0 ? ' is-active' : '') + '"'
                + ' data-snapshot-id="' + PlatformUtils.escapeHtml(String(snapshot.id)) + '">'
                + '<div class="asset-history-item-content">'
                + '<div class="asset-history-item-top">'
                + '<div class="asset-history-item-title-wrap">'
                + '<span class="asset-history-item-title">记录 #' + PlatformUtils.escapeHtml(String(snapshot.id)) + '</span>'
                + (index === 0 ? '<span class="asset-history-item-badge">最新</span>' : '')
                + '</div>'
                + '<span class="asset-history-item-time">更新时间：' + PlatformUtils.escapeHtml(updatedAt || "--") + '</span>'
                + '</div>'
                + '<div class="asset-history-item-summary">' + metrics.join("") + '</div>'
                + '<div class="asset-history-item-bottom">'
                + '<span class="asset-history-item-time">记录时间：' + PlatformUtils.escapeHtml(createdAt || "--") + '</span>'
                + '<span class="asset-history-item-time">记录编号：' + PlatformUtils.escapeHtml(String(snapshot.id)) + '</span>'
                + '</div>'
                + '</div>'
                + '<label class="asset-history-item-check">'
                + '<input type="checkbox" class="asset-compare-checkbox" value="' + PlatformUtils.escapeHtml(String(snapshot.id)) + '">'
                + '<span>对比</span>'
                + '</label>'
                + '</article>';
        }

        function bindAssetHistoryDialog(rootElement, host, snapshots, assetMeta) {
            const snapshotMap = {};
            snapshots.forEach(function (snapshot) {
                snapshotMap[String(snapshot.id)] = snapshot;
            });

            const shellElement = rootElement.querySelector(".asset-history-shell");
            const assetType = shellElement ? (shellElement.getAttribute("data-asset-type") || "") : "";
            const stageContent = rootElement.querySelector(".asset-history-stage-content");
            const compareTrigger = rootElement.querySelector(".asset-compare-trigger");
            const compareCancel = rootElement.querySelector(".asset-compare-cancel");
            const analyzeTrigger = rootElement.querySelector(".asset-ai-analyze-trigger");
            const progressBox = rootElement.querySelector(".asset-ai-progress");
            const progressBar = rootElement.querySelector(".asset-ai-progress-bar");
            const progressText = rootElement.querySelector(".asset-ai-progress-text");
            const historyItems = Array.from(rootElement.querySelectorAll(".asset-history-item"));
            const compareCheckboxes = Array.from(rootElement.querySelectorAll(".asset-compare-checkbox"));
            let currentRiskFilter = "all";
            let isAnalyzing = false;
            let progressTimer = null;
            let analyzeStatusPoller = null;

            function setAnalyzeProgress(percent, text) {
                if (progressBox) {
                    progressBox.style.display = "grid";
                }
                if (progressBar) {
                    progressBar.style.width = Math.max(0, Math.min(100, percent)) + "%";
                }
                if (progressText && text) {
                    progressText.textContent = text;
                }
            }

            function resetAnalyzeProgress(delayHide) {
                if (progressTimer) {
                    window.clearInterval(progressTimer);
                    progressTimer = null;
                }
                if (analyzeStatusPoller) {
                    window.clearTimeout(analyzeStatusPoller);
                    analyzeStatusPoller = null;
                }
                window.setTimeout(function () {
                    if (progressBox) {
                        progressBox.style.display = "none";
                    }
                    if (progressBar) {
                        progressBar.style.width = "0%";
                    }
                    if (progressText) {
                        progressText.textContent = "准备开始分析...";
                    }
                }, delayHide || 0);
            }

            function finishAnalyzeFlow() {
                isAnalyzing = false;
                analyzeTrigger.disabled = false;
                analyzeTrigger.textContent = "AI辅助分析";
            }

            function applyAnalyzeTaskStatus(taskStatus) {
                if (!taskStatus) {
                    return;
                }
                setAnalyzeProgress(taskStatus.progress || 0, taskStatus.stageText || "AI 正在分析...");
                if (taskStatus.status === "success") {
                    const normalizedSnapshot = taskStatus.result || null;
                    layer.msg("AI 分析完成");
                    currentRiskFilter = "all";
                    if (normalizedSnapshot) {
                        snapshotMap[String(normalizedSnapshot.id)] = normalizedSnapshot;
                    }
                    renderSnapshot(normalizedSnapshot);
                    historyItems.forEach(function (node) {
                        node.classList.toggle("is-active", String(node.getAttribute("data-snapshot-id")) === String(normalizedSnapshot && normalizedSnapshot.id));
                    });
                    finishAnalyzeFlow();
                    resetAnalyzeProgress(1200);
                    return;
                }
                if (taskStatus.status === "failed") {
                    layer.msg(taskStatus.errorMessage || taskStatus.stageText || "AI 分析失败");
                    finishAnalyzeFlow();
                    resetAnalyzeProgress(1500);
                    return;
                }
                analyzeStatusPoller = window.setTimeout(function () {
                    PlatformUtils.request("/api/hosts/asset-analyze-tasks/" + encodeURIComponent(taskStatus.taskId))
                        .then(applyAnalyzeTaskStatus)
                        .catch(function (error) {
                            layer.msg(error.message || "获取分析进度失败");
                            finishAnalyzeFlow();
                            resetAnalyzeProgress(1500);
                        });
                }, 1000);
            }

            function syncCompareState() {
                const checkedIds = compareCheckboxes
                    .filter(function (input) { return input.checked; })
                    .map(function (input) { return input.value; });
                compareTrigger.disabled = checkedIds.length !== 2;
                return checkedIds;
            }

            function renderSnapshot(snapshot) {
                stageContent.innerHTML = snapshot
                    ? buildAssetSnapshotView(host, snapshot, assetMeta, currentRiskFilter)
                    : '<div class="asset-history-empty">未找到该条记录</div>';
                bindRiskFilters(stageContent, snapshot, host, assetMeta, function (nextRiskFilter) {
                    currentRiskFilter = nextRiskFilter;
                });
            }

            historyItems.forEach(function (item) {
                item.addEventListener("click", function (event) {
                    if (event.target.closest(".asset-history-item-check")) {
                        return;
                    }
                    historyItems.forEach(function (node) {
                        node.classList.toggle("is-active", node === item);
                    });
                    const snapshotId = item.getAttribute("data-snapshot-id");
                    const snapshot = snapshotMap[snapshotId];
                    renderSnapshot(snapshot);
                    compareCancel.style.display = "none";
                });
            });

            compareCheckboxes.forEach(function (input) {
                input.addEventListener("change", function () {
                    const checkedIds = syncCompareState();
                    if (checkedIds.length > 2) {
                        input.checked = false;
                        layer.msg("最多只能选择两条记录进行对比");
                        syncCompareState();
                    }
                });
            });

            compareTrigger.addEventListener("click", function () {
                const checkedIds = syncCompareState();
                if (checkedIds.length !== 2) {
                    layer.msg("请选择两条记录进行对比");
                    return;
                }
                const leftSnapshot = snapshotMap[checkedIds[0]];
                const rightSnapshot = snapshotMap[checkedIds[1]];
                stageContent.innerHTML = buildAssetCompareView(host, leftSnapshot, rightSnapshot, assetMeta);
                compareCancel.style.display = "inline-flex";
                historyItems.forEach(function (node) {
                    node.classList.remove("is-active");
                });
            });

            compareCancel.addEventListener("click", function () {
                compareCancel.style.display = "none";
                const fallbackSnapshot = snapshots[0] || null;
                if (!fallbackSnapshot) {
                    stageContent.innerHTML = '<div class="asset-history-empty">当前没有历史记录</div>';
                    return;
                }
                renderSnapshot(fallbackSnapshot);
                historyItems.forEach(function (node, index) {
                    node.classList.toggle("is-active", index === 0);
                });
            });

            if (analyzeTrigger) {
                analyzeTrigger.addEventListener("click", function () {
                    if (isAnalyzing) {
                        return;
                    }
                    isAnalyzing = true;
                    analyzeTrigger.disabled = true;
                    analyzeTrigger.textContent = "分析中...";
                    setAnalyzeProgress(4, "正在创建分析任务...");
                    PlatformUtils.request("/api/hosts/" + host.id + "/asset-detail/" + assetType + "/analyze-task", {
                        method: "POST"
                    })
                        .then(applyAnalyzeTaskStatus)
                        .catch(function (error) {
                            layer.msg(error.message || "AI 分析失败");
                            finishAnalyzeFlow();
                            resetAnalyzeProgress(1500);
                        });
                });
            }

            syncCompareState();
        }

        function buildAssetSnapshotView(host, snapshot, assetMeta, riskFilter) {
            const primaryItems = parseJsonArray(snapshot && snapshot.primaryPayload);
            const secondaryItems = parseJsonArray(snapshot && snapshot.secondaryPayload);
            const rawPayload = prettyJson(snapshot && snapshot.rawPayload);
            const riskMode = hasRiskAnalysis(primaryItems, secondaryItems);
            const summaryCards = [
                renderMetricCard(assetMeta.primaryCountLabel, snapshot && snapshot.primaryCount),
                renderMetricCard("记录时间", snapshot ? PlatformUtils.formatDateTime(snapshot.createdAt) : "--")
            ];

            if (assetMeta.secondaryCountLabel) {
                summaryCards.push(renderMetricCard(assetMeta.secondaryCountLabel, snapshot && snapshot.secondaryCount));
            }
            summaryCards.push(renderMetricCard("更新时间", snapshot ? PlatformUtils.formatDateTime(snapshot.updatedAt) : "--"));

            const normalizedRiskFilter = riskFilter || "all";
            const filteredPrimaryItems = riskMode ? filterRiskItems(primaryItems, normalizedRiskFilter) : primaryItems;
            const filteredSecondaryItems = riskMode ? filterRiskItems(secondaryItems, normalizedRiskFilter) : secondaryItems;
            const riskStats = riskMode ? buildRiskStats(primaryItems, secondaryItems, assetMeta.label) : [];

            return '<div class="asset-dialog-shell">'
                + '<section class="asset-section-head asset-snapshot-head">'
                + '<h3>记录 #' + PlatformUtils.escapeHtml(String(snapshot ? snapshot.id : "--")) + '</h3>'
                + '<p>查看本次' + PlatformUtils.escapeHtml(assetMeta.label) + '采集结果的详细内容。</p>'
                + '</section>'
                + '<section class="asset-summary-grid' + (riskMode ? ' asset-account-summary-grid' : '') + '">' + summaryCards.join("") + riskStats.join("") + '</section>'
                + (riskMode ? renderRiskFilterTabs(normalizedRiskFilter) : '')
                + renderAssetSectionBlock(assetMeta.primarySectionTitle, filteredPrimaryItems, riskMode ? {
                    totalCount: primaryItems.length,
                    filteredCount: filteredPrimaryItems.length,
                    riskMode: true
                } : null)
                + (assetMeta.secondarySectionTitle ? renderAssetSectionBlock(assetMeta.secondarySectionTitle, filteredSecondaryItems, riskMode ? {
                    totalCount: secondaryItems.length,
                    filteredCount: filteredSecondaryItems.length,
                    riskMode: true
                } : null) : "")
                + renderAssetRawBlock(rawPayload)
                + '</div>';
        }

        function buildAssetCompareView(host, leftSnapshot, rightSnapshot, assetMeta) {
            return '<div class="asset-compare-grid">'
                + '<section class="asset-compare-column">'
                + '<div class="asset-compare-head">'
                + '<h4>记录 #' + PlatformUtils.escapeHtml(String(leftSnapshot.id)) + '</h4>'
                + '<span>更新时间：' + PlatformUtils.escapeHtml(PlatformUtils.formatDateTime(leftSnapshot.updatedAt) || "--") + '</span>'
                + '</div>'
                + buildAssetSnapshotView(host, leftSnapshot, assetMeta)
                + '</section>'
                + '<section class="asset-compare-column">'
                + '<div class="asset-compare-head">'
                + '<h4>记录 #' + PlatformUtils.escapeHtml(String(rightSnapshot.id)) + '</h4>'
                + '<span>更新时间：' + PlatformUtils.escapeHtml(PlatformUtils.formatDateTime(rightSnapshot.updatedAt) || "--") + '</span>'
                + '</div>'
                + buildAssetSnapshotView(host, rightSnapshot, assetMeta)
                + '</section>'
                + '</div>';
        }

        function renderAssetSectionBlock(title, items, options) {
            const config = options || {};
            const suffix = typeof config.filteredCount === "number"
                ? '（当前显示 ' + config.filteredCount + ' / ' + (config.totalCount || 0) + '）'
                : '';
            return '<section class="asset-array-section">'
                + '<div class="asset-block-head">'
                + '<div class="asset-block-title">' + PlatformUtils.escapeHtml(title) + suffix + '</div>'
                + '<span class="asset-block-count">共 ' + items.length + ' 条</span>'
                + '</div>'
                + (items.length ? renderArrayGrid(items, !!config.riskMode, title) : '<div class="asset-empty-inline">暂无数据</div>')
                + '</section>';
        }

        function renderAssetRawBlock(rawPayload) {
            return '<section class="asset-raw-block">'
                + '<div class="asset-block-head">'
                + '<div class="asset-block-title">原始消息</div>'
                + '<span class="asset-block-hint">用于排障和核对上报内容</span>'
                + '</div>'
                + '<pre>' + PlatformUtils.escapeHtml(rawPayload) + '</pre>'
                + '</section>';
        }

        function renderArrayGrid(items, riskMode, title) {
            return '<div class="asset-array-grid">'
                + items.map(function (item, index) {
                    return renderObjectCard(index, item, riskMode, title);
                }).join("")
                + '</div>';
        }

        function renderObjectCard(index, item, riskMode, title) {
            const entries = item && typeof item === "object" && !Array.isArray(item)
                ? Object.entries(item)
                : [["value", item]];
            const assetLabel = resolveAssetLabelByTitle(title);
            const summaryHtml = renderAssetObjectSummary(item, assetLabel);
            const sortedEntries = sortAssetEntries(entries, getPreferredFieldOrder(assetLabel));
            return '<article class="asset-object-card">'
                + '<header><span>第 ' + (index + 1) + ' 项</span></header>'
                + summaryHtml
                + '<div class="asset-object-fields">'
                + sortedEntries.map(function (entry) {
                    return '<div class="asset-object-field">'
                        + '<label>' + PlatformUtils.escapeHtml(formatFieldLabel(entry[0])) + '</label>'
                        + '<div>' + formatFieldValue(entry[0], entry[1]) + '</div>'
                        + '</div>';
                }).join("")
                + '</div>'
                + '</article>';
        }

        function resolveAssetLabelByTitle(title) {
            if (title.indexOf("服务") >= 0) {
                return "服务";
            }
            if (title.indexOf("进程") >= 0) {
                return "进程";
            }
            if (title.indexOf("安装程序") >= 0 || title.indexOf("App") >= 0) {
                return "安装程序";
            }
            if (title.indexOf("账号") >= 0) {
                return "账号";
            }
            return "";
        }

        function renderAssetObjectSummary(item, assetLabel) {
            if (!item || typeof item !== "object" || Array.isArray(item)) {
                return "";
            }

            const chips = [];
            if (assetLabel === "服务") {
                chips.push(renderSummaryChip("服务名", firstDefinedValue(item, ["Name", "name"])));
                chips.push(renderSummaryChip("状态", firstDefinedValue(item, ["State", "state"])));
                chips.push(renderSummaryChip("启动方式", firstDefinedValue(item, ["StartMode", "start_mode"])));
                chips.push(renderSummaryChip("启动账户", firstDefinedValue(item, ["StartName", "start_name"])));
            } else if (assetLabel === "进程") {
                chips.push(renderSummaryChip("进程名", firstDefinedValue(item, ["Name", "name"])));
                chips.push(renderSummaryChip("进程ID", firstDefinedValue(item, ["ProcessId", "process_id"])));
                chips.push(renderSummaryChip("可执行路径", firstDefinedValue(item, ["ExecutablePath", "executable_path"])));
            } else if (assetLabel === "安装程序") {
                chips.push(renderSummaryChip("程序名", firstDefinedValue(item, ["name", "Name"])));
                chips.push(renderSummaryChip("发布者", firstDefinedValue(item, ["publisher", "Publisher"])));
                chips.push(renderSummaryChip("版本", firstDefinedValue(item, ["version", "Version"])));
                chips.push(renderSummaryChip("安装时间", firstDefinedValue(item, ["install_date", "InstallDate"])));
            } else if (assetLabel === "账号") {
                chips.push(renderSummaryChip("账号名", firstDefinedValue(item, ["name", "Name"])));
                chips.push(renderSummaryChip("启用状态", firstDefinedValue(item, ["enabled", "Enabled"])));
                chips.push(renderSummaryChip("最后登录", firstDefinedValue(item, ["last_logon", "LastLogon"])));
            }

            const validChips = chips.filter(Boolean);
            return validChips.length
                ? '<section class="asset-object-summary">' + validChips.join("") + '</section>'
                : "";
        }

        function renderSummaryChip(label, value) {
            if (value === null || value === undefined || value === "") {
                return "";
            }
            return '<div class="asset-summary-chip">'
                + '<span>' + PlatformUtils.escapeHtml(label) + '</span>'
                + '<strong>' + formatSummaryValue(value) + '</strong>'
                + '</div>';
        }

        function formatSummaryValue(value) {
            if (value === null || value === undefined || value === "") {
                return '<span class="asset-value-muted">--</span>';
            }
            if (typeof value === "boolean") {
                return PlatformUtils.escapeHtml(value ? "true" : "false");
            }
            return PlatformUtils.escapeHtml(String(value));
        }

        function firstDefinedValue(item, keys) {
            for (let index = 0; index < keys.length; index += 1) {
                const key = keys[index];
                if (item[key] !== undefined && item[key] !== null && item[key] !== "") {
                    return item[key];
                }
            }
            return "";
        }

        function getPreferredFieldOrder(assetLabel) {
            if (assetLabel === "服务") {
                return ["Name", "DisplayName", "State", "StartMode", "StartName", "ProcessId", "risk_level", "result"];
            }
            if (assetLabel === "进程") {
                return ["Name", "ProcessId", "ExecutablePath", "risk_level", "result"];
            }
            if (assetLabel === "安装程序") {
                return ["name", "publisher", "version", "install_date", "risk_level", "result"];
            }
            if (assetLabel === "账号") {
                return ["name", "enabled", "last_logon", "is_shadow_account", "risk_level", "result"];
            }
            return ["risk_level", "result"];
        }

        function sortAssetEntries(entries, preferredFields) {
            const orderMap = {};
            preferredFields.forEach(function (field, index) {
                orderMap[field] = index;
            });
            return entries.slice().sort(function (left, right) {
                const leftIndex = orderMap[left[0]];
                const rightIndex = orderMap[right[0]];
                const normalizedLeft = leftIndex === undefined ? Number.MAX_SAFE_INTEGER : leftIndex;
                const normalizedRight = rightIndex === undefined ? Number.MAX_SAFE_INTEGER : rightIndex;
                if (normalizedLeft !== normalizedRight) {
                    return normalizedLeft - normalizedRight;
                }
                return String(left[0]).localeCompare(String(right[0]));
            });
        }

        function renderMetricCard(label, value, rawHtml) {
            const renderedValue = rawHtml ? value : PlatformUtils.renderValue(value);
            return '<div class="asset-summary-card">'
                + '<span>' + PlatformUtils.escapeHtml(label) + '</span>'
                + '<strong>' + renderedValue + '</strong>'
                + '</div>';
        }

        function renderHistoryMetric(label, value) {
            return '<span class="asset-history-summary-pill">'
                + PlatformUtils.escapeHtml(label) + '：' + PlatformUtils.escapeHtml(String(value == null || value === "" ? "--" : value))
                + '</span>';
        }

        function renderRiskFilterTabs(activeKey) {
            const keys = ["all", "high", "medium", "low", "safe"];
            return '<div class="asset-risk-tabs">'
                + keys.map(function (key) {
                    return '<button type="button" class="asset-risk-tab' + (key === activeKey ? ' is-active' : '') + '" data-risk-filter="' + key + '">'
                        + PlatformUtils.escapeHtml(riskFilterLabels[key])
                        + '</button>';
                }).join("")
                + '</div>';
        }

        function buildRiskStats(primaryItems, secondaryItems, assetLabel) {
            const allItems = primaryItems.concat(secondaryItems);
            const buckets = {
                high: 0,
                medium: 0,
                low: 0,
                safe: 0
            };
            allItems.forEach(function (item) {
                const key = resolveRiskLevel(item);
                if (buckets[key] !== undefined) {
                    buckets[key] += 1;
                }
            });
            return [
                renderRiskStatCard("高风险" + assetLabel, buckets.high, "high"),
                renderRiskStatCard("中风险" + assetLabel, buckets.medium, "medium"),
                renderRiskStatCard("低风险" + assetLabel, buckets.low, "low"),
                renderRiskStatCard("无风险" + assetLabel, buckets.safe, "safe")
            ];
        }

        function renderRiskStatCard(label, count, riskKey) {
            return '<div class="asset-summary-card asset-risk-summary-card asset-risk-summary-' + PlatformUtils.escapeHtml(riskKey) + '">'
                + '<span>' + PlatformUtils.escapeHtml(label) + '</span>'
                + '<strong>' + PlatformUtils.escapeHtml(String(count || 0)) + '</strong>'
                + '</div>';
        }

        function bindRiskFilters(container, snapshot, host, assetMeta, onChange) {
            Array.from(container.querySelectorAll("[data-risk-filter]")).forEach(function (button) {
                button.addEventListener("click", function () {
                    const nextRiskFilter = button.getAttribute("data-risk-filter") || "all";
                    if (typeof onChange === "function") {
                        onChange(nextRiskFilter);
                    }
                    container.innerHTML = buildAssetSnapshotView(host, snapshot, assetMeta, nextRiskFilter);
                    bindRiskFilters(container, snapshot, host, assetMeta, onChange);
                });
            });
        }

        function hasRiskAnalysis(primaryItems, secondaryItems) {
            const allItems = (primaryItems || []).concat(secondaryItems || []);
            return allItems.some(function (item) {
                return !!resolveRiskLevel(item) || !!(item && item.result);
            });
        }

        function filterRiskItems(items, riskKey) {
            if (riskKey === "all") {
                return items;
            }
            return items.filter(function (item) {
                return resolveRiskLevel(item) === riskKey;
            });
        }

        function normalizeRiskLevel(value) {
            if (!value) {
                return "";
            }
            const raw = String(value).trim();
            if (!raw) {
                return "";
            }
            if (riskLevelMap[raw]) {
                return riskLevelMap[raw];
            }

            const normalized = raw
                .replace(/\s+/g, "")
                .replace(/[：:，,。；;！!？?]/g, "")
                .toLowerCase();

            if (normalized.indexOf("high") >= 0 || normalized.indexOf("高风险") >= 0 || normalized === "高") {
                return "high";
            }
            if (normalized.indexOf("medium") >= 0 || normalized.indexOf("中风险") >= 0 || normalized === "中") {
                return "medium";
            }
            if (normalized.indexOf("low") >= 0 || normalized.indexOf("低风险") >= 0 || normalized === "低") {
                return "low";
            }
            if (normalized.indexOf("safe") >= 0 || normalized.indexOf("norisk") >= 0
                || normalized.indexOf("无风险") >= 0 || normalized === "无") {
                return "safe";
            }
            return "";
        }

        function resolveRiskLevel(item) {
            if (!item || typeof item !== "object") {
                return "";
            }
            const direct = normalizeRiskLevel(item.risk_level);
            if (direct) {
                return direct;
            }

            const resultText = String(item.result || "");
            if (!resultText) {
                return "";
            }
            if (resultText.indexOf("高风险") >= 0 || resultText.indexOf("风险等级：高") >= 0 || resultText.indexOf("风险等级:高") >= 0) {
                return "high";
            }
            if (resultText.indexOf("中风险") >= 0 || resultText.indexOf("风险等级：中") >= 0 || resultText.indexOf("风险等级:中") >= 0) {
                return "medium";
            }
            if (resultText.indexOf("低风险") >= 0 || resultText.indexOf("风险等级：低") >= 0 || resultText.indexOf("风险等级:低") >= 0) {
                return "low";
            }
            if (resultText.indexOf("无风险") >= 0 || resultText.indexOf("风险等级：无") >= 0 || resultText.indexOf("风险等级:无") >= 0) {
                return "safe";
            }
            return "";
        }

        function getRiskDisplayLabel(riskKey) {
            return riskFilterLabels[riskKey] || "未分析";
        }

        function formatFieldLabel(field) {
            const fieldMap = {
                name: "账号名",
                Name: "名称",
                enabled: "启用状态",
                Enabled: "启用状态",
                full_name: "全名",
                description: "描述",
                sid: "SID",
                last_logon: "最后登录时间",
                is_shadow_account: "是否影子账号",
                DisplayName: "显示名称",
                State: "状态",
                StartMode: "启动方式",
                StartName: "启动账户",
                ProcessId: "进程ID",
                ExecutablePath: "可执行路径",
                CommandLine: "命令行",
                ParentProcessId: "父进程ID",
                Company: "厂商",
                Product: "产品",
                ProductName: "产品名称",
                Publisher: "发布者",
                Version: "版本",
                InstallDate: "安装日期",
                InstallLocation: "安装位置",
                UninstallString: "卸载命令",
                Description: "说明",
                Path: "路径",
                display_name: "显示名称",
                start_name: "启动账户",
                start_mode: "启动方式",
                state: "状态",
                process_id: "进程ID",
                parent_process_id: "父进程ID",
                executable_path: "可执行路径",
                command_line: "命令行",
                company: "厂商",
                product: "产品",
                product_name: "产品名称",
                publisher: "发布者",
                version: "版本",
                install_location: "安装位置",
                install_date: "安装时间",
                risk_level: "风险等级",
                result: "分析结果"
            };
            return fieldMap[field] || field;
        }

        function formatAnyValue(value) {
            if (value === null || value === undefined || value === "") {
                return '<span class="asset-value-muted">--</span>';
            }
            if (typeof value === "string" && (value.indexOf("风险原因") >= 0 || value.indexOf("加固建议") >= 0 || value.indexOf("建议：") >= 0)) {
                return formatAnalysisResult(value);
            }
            if (Array.isArray(value) || typeof value === "object") {
                return '<pre class="asset-inline-pre">' + PlatformUtils.escapeHtml(JSON.stringify(value, null, 2)) + '</pre>';
            }
            if (typeof value === "boolean") {
                return PlatformUtils.escapeHtml(value ? "true" : "false");
            }
            return PlatformUtils.escapeHtml(String(value));
        }

        function formatFieldValue(field, value) {
            if (field === "risk_level") {
                const riskLevel = normalizeRiskLevel(value);
                if (riskLevel) {
                    return '<span class="asset-risk-badge asset-risk-' + PlatformUtils.escapeHtml(riskLevel) + '">'
                        + PlatformUtils.escapeHtml(getRiskDisplayLabel(riskLevel))
                        + '</span>';
                }
            }
            return formatAnyValue(value);
        }

        function formatAnalysisResult(value) {
            const raw = String(value || "").trim();
            if (!raw) {
                return '<span class="asset-value-muted">--</span>';
            }

            const normalized = raw.replace(/\r\n/g, "\n");
            const reasonMatch = normalized.match(/风险原因[：:]\s*([\s\S]*?)(?=加固建议[：:]|建议[：:]|$)/);
            const adviceMatch = normalized.match(/(?:加固建议|建议)[：:]\s*([\s\S]*)$/);

            const reasonText = reasonMatch ? reasonMatch[1].trim() : "";
            const adviceText = adviceMatch ? adviceMatch[1].trim() : "";

            if (!reasonText && !adviceText) {
                return '<div class="asset-analysis-result">'
                    + '<div class="asset-analysis-section">'
                    + '<strong>分析结果</strong>'
                    + '<div>' + PlatformUtils.escapeHtml(raw).replace(/\n/g, "<br>") + '</div>'
                    + '</div>'
                    + '</div>';
            }

            return '<div class="asset-analysis-result">'
                + (reasonText
                    ? '<div class="asset-analysis-section">'
                        + '<strong>风险原因</strong>'
                        + '<div>' + PlatformUtils.escapeHtml(reasonText).replace(/\n/g, "<br>") + '</div>'
                        + '</div>'
                    : '')
                + (adviceText
                    ? '<div class="asset-analysis-section">'
                        + '<strong>加固建议</strong>'
                        + '<div>' + PlatformUtils.escapeHtml(adviceText).replace(/\n/g, "<br>") + '</div>'
                        + '</div>'
                    : '')
                + '</div>';
        }

        function parseJsonArray(value) {
            if (!value) {
                return [];
            }
            try {
                const parsed = JSON.parse(value);
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                return [];
            }
        }

        function prettyJson(value) {
            if (!value) {
                return "--";
            }
            try {
                return JSON.stringify(JSON.parse(value), null, 2);
            } catch (error) {
                return String(value);
            }
        }

        function openHostDialog(title, host) {
            const dialogWidth = Math.min(window.innerWidth - 32, 920) + "px";

            layer.open({
                type: 1,
                title: title,
                area: [dialogWidth, "auto"],
                shadeClose: false,
                content: buildHostForm(host),
                success: function (layero, index) {
                    const rootElement = layero[0] || layero;
                    const formElement = rootElement.querySelector("form");
                    const cancelButton = rootElement.querySelector(".dialog-cancel");

                    cancelButton.addEventListener("click", function () {
                        layer.close(index);
                    });

                    form.render();

                    formElement.addEventListener("submit", function (event) {
                        event.preventDefault();
                        const formData = new FormData(formElement);
                        const payload = {
                            hostname: String(formData.get("hostname") || "").trim(),
                            ipAddress: String(formData.get("ipAddress") || "").trim(),
                            macAddress: String(formData.get("macAddress") || "").trim(),
                            cpuArchitecture: String(formData.get("cpuArchitecture") || "").trim(),
                            cpuName: String(formData.get("cpuName") || "").trim(),
                            logicalCores: formData.get("logicalCores") ? Number(formData.get("logicalCores")) : null,
                            memoryAvailable: String(formData.get("memoryAvailable") || "").trim(),
                            memoryTotal: String(formData.get("memoryTotal") || "").trim(),
                            osDetail: String(formData.get("osDetail") || "").trim(),
                            osName: String(formData.get("osName") || "").trim(),
                            osType: String(formData.get("osType") || "").trim(),
                            osVersion: String(formData.get("osVersion") || "").trim(),
                            status: formData.get("status")
                        };

                        if (!payload.hostname) {
                            layer.msg("请输入主机名");
                            return;
                        }
                        if (!payload.macAddress) {
                            layer.msg("请输入 MAC 地址");
                            return;
                        }

                        PlatformUtils.request("/api/hosts/" + host.id, {
                            method: "PUT",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(payload)
                        })
                            .then(function () {
                                layer.close(index);
                                layer.msg("更新成功");
                                reloadTable(false);
                            })
                            .catch(function (error) {
                                layer.msg(error.message || "保存失败");
                            });
                    });
                }
            });
        }

        function buildHostForm(host) {
            return '<form class="layui-form page-form">'
                + '<div class="dialog-grid">'
                + renderInput("主机名", "hostname", host ? host.hostname : "")
                + renderInput("IP 地址", "ipAddress", host ? host.ipAddress : "")
                + renderInput("MAC 地址", "macAddress", host ? host.macAddress : "")
                + renderInput("CPU 架构", "cpuArchitecture", host ? host.cpuArchitecture : "")
                + renderInput("CPU 名称", "cpuName", host ? host.cpuName : "")
                + renderInput("逻辑核心", "logicalCores", host ? host.logicalCores : "", false, "请输入逻辑核心数", "number")
                + renderInput("可用内存", "memoryAvailable", host ? host.memoryAvailable : "")
                + renderInput("总内存", "memoryTotal", host ? host.memoryTotal : "")
                + renderInput("系统详情", "osDetail", host ? host.osDetail : "")
                + renderInput("系统名称", "osName", host ? host.osName : "")
                + renderInput("系统类型", "osType", host ? host.osType : "")
                + renderInput("系统版本", "osVersion", host ? host.osVersion : "")
                + renderSelect("状态", "status", host ? String(host.status || "0") : "0", [
                    {value: "1", label: "在线"},
                    {value: "0", label: "下线"}
                ])
                + '</div>'
                + '<div class="page-form-actions">'
                + '<button type="button" class="layui-btn page-secondary-btn dialog-cancel">取消</button>'
                + '<button type="submit" class="layui-btn page-btn">保存</button>'
                + '</div>'
                + '</form>';
        }

        function renderInput(label, name, value, readonly, placeholder, type) {
            return '<div class="layui-form-item">'
                + '<label class="layui-form-label">' + label + '</label>'
                + '<div class="layui-input-block">'
                + '<input type="' + (type || "text") + '" name="' + name + '" value="' + PlatformUtils.escapeHtml(value || "") + '"'
                + (readonly ? ' readonly' : '')
                + ' placeholder="' + PlatformUtils.escapeHtml(placeholder || ("请输入" + label)) + '" autocomplete="off" class="layui-input">'
                + '</div>'
                + '</div>';
        }

        function renderSelect(label, name, currentValue, options) {
            return '<div class="layui-form-item">'
                + '<label class="layui-form-label">' + label + '</label>'
                + '<div class="layui-input-block">'
                + '<select name="' + name + '">'
                + options.map(function (option) {
                    const selected = option.value === currentValue ? ' selected' : '';
                    return '<option value="' + option.value + '"' + selected + '>' + option.label + '</option>';
                }).join("")
                + '</select>'
                + '</div>'
                + '</div>';
        }
    });
</script>
</body>
</html>
