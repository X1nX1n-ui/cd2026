<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心</title>
<link rel="stylesheet" href="https://cdn.staticfile.net/layui/2.9.13/css/layui.css">
<link rel="stylesheet" href="/css/app.css">
<style>
.password-section{margin-top:16px}
.pwd-field{margin-bottom:18px}
.pwd-field label{display:block;font-size:13px;color:var(--color-text-muted);margin-bottom:6px;font-weight:500;letter-spacing:.02em}
.pwd-input-wrap{display:flex;gap:8px;align-items:center;position:relative}
.pwd-input-wrap input{flex:1;height:42px;padding:0 40px 0 14px;border:1px solid var(--color-border);border-radius:var(--radius-8);background:rgba(10,13,19,.88);color:var(--color-text);font-size:14px;font-family:"Consolas","Cascadia Mono",monospace;outline:none;transition:border-color .2s,box-shadow .2s}
.pwd-input-wrap input:focus{border-color:var(--color-primary);box-shadow:var(--glow-primary);background:rgba(8,11,17,1)}
.pwd-input-wrap input::placeholder{color:rgba(140,144,159,.5)}
.pwd-input-wrap input.is-weak{border-color:#ef4444}
.pwd-input-wrap input.is-medium{border-color:#f59e0b}
.pwd-input-wrap input.is-strong{border-color:#10b981}
.pwd-input-inner{position:relative;flex:1;display:flex}
.pwd-input-inner input{padding:0 40px 0 14px;flex:1}
.pwd-toggle{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--color-text-soft);cursor:pointer;border-radius:6px;transition:color .15s,background .15s;z-index:1}
.pwd-toggle:hover{color:var(--color-text-muted);background:rgba(79,134,247,.1)}
.pwd-toggle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.pwd-strength-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden;transition:all .3s}
.pwd-strength-bar-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.pwd-strength-bar-fill.weak{width:33%;background:#ef4444}
.pwd-strength-bar-fill.medium{width:66%;background:#f59e0b}
.pwd-strength-bar-fill.strong{width:100%;background:#10b981}
.pwd-strength-text{font-size:12px;margin-top:4px;display:flex;align-items:center;gap:4px}
.pwd-strength-text.weak{color:#ef4444}
.pwd-strength-text.medium{color:#f59e0b}
.pwd-strength-text.strong{color:#10b981}
.pwd-hint{font-size:12px;color:var(--color-text-soft);margin-top:2px;display:flex;flex-wrap:wrap;gap:6px}
.pwd-hint span{display:inline-flex;align-items:center;gap:2px}
.pwd-hint span.met{color:#10b981}
.pwd-hint span.unmet{color:var(--color-text-soft)}
.btn-generate{height:38px;padding:0 14px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);border-radius:var(--radius-8);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.btn-generate:hover{border-color:var(--color-primary);color:#dce8ff;background:rgba(79,134,247,.12)}
.verify-row{display:flex;gap:8px;align-items:center}
.verify-row input{flex:1;height:42px;padding:0 14px;border:1px solid var(--color-border);border-radius:var(--radius-8);background:rgba(10,13,19,.88);color:var(--color-text);font-size:14px;font-family:"Consolas","Cascadia Mono",monospace;outline:none;letter-spacing:6px;text-align:center;transition:border-color .2s,box-shadow .2s}
.verify-row input:focus{border-color:var(--color-primary);box-shadow:var(--glow-primary)}
.verify-row input::placeholder{color:rgba(140,144,159,.5);letter-spacing:normal}
.btn-send-code{height:42px;padding:0 16px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);border-radius:var(--radius-8);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;min-width:120px;flex-shrink:0}
.btn-send-code:hover:not(:disabled){border-color:var(--color-primary);color:#dce8ff;background:rgba(79,134,247,.12)}
.btn-send-code:disabled{opacity:.4;cursor:not-allowed}
.btn-submit-pwd{width:100%;height:44px;background:linear-gradient(180deg,#5f95ff 0%,#4f86f7 100%);color:#eef2f7;border:1px solid rgba(79,134,247,.3);border-radius:var(--radius-8);font-size:15px;font-weight:500;cursor:pointer;transition:opacity .2s,background .2s;box-shadow:0 12px 30px rgba(79,134,247,.18)}
.btn-submit-pwd:hover:not(:disabled){background:linear-gradient(180deg,#76a5ff 0%,#5b90fb 100%)}
.btn-submit-pwd:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.pwd-message{font-size:13px;margin-top:8px;padding:10px 14px;border-radius:var(--radius-8);display:none;line-height:1.5}
.pwd-message.hint{display:block;background:rgba(79,134,247,.1);color:var(--color-primary-dark);border:1px solid rgba(79,134,247,.18)}
.pwd-message.warning{display:block;background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.18)}
.pwd-message.error{display:block;background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.18)}
.pwd-match-info{font-size:12px;margin-top:4px;display:none}
.countdown-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.countdown-overlay.show{display:flex}
.countdown-box{background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:12px;padding:40px;text-align:center;box-shadow:var(--shadow-level-2)}
.countdown-box h3{font-size:20px;color:var(--color-text);margin-bottom:12px}
.countdown-box p{font-size:14px;color:var(--color-text-muted);margin-bottom:20px}
.countdown-num{font-size:48px;font-weight:700;color:var(--color-primary)}
</style>
</head>
<body class="app-body">
<div class="page-shell">
<div class="page-section">
<section class="page-heading"><div><h1>个人中心</h1><p>管理您的账户信息和账号安全</p></div></section>
<section class="profile-layout">
<article class="profile-card profile-avatar-card">
<h2>头像</h2>
<div class="avatar-preview-wrap"><img id="avatarPreview" class="avatar-preview" src="/images/default-avatar.svg" alt="头像预览"></div>
<div class="avatar-meta" id="avatarName">尚未设置头像</div>
<div class="avatar-actions">
<input type="file" id="avatarFile" class="avatar-file-input" accept=".jpg,.jpeg,.png,.gif,.webp,image/*">
<button type="button" class="layui-btn page-secondary-btn avatar-action-btn" id="selectAvatarButton">选择头像</button>
<button type="button" class="layui-btn page-btn avatar-action-btn" id="uploadAvatarButton">上传头像</button>
</div>
<p class="avatar-tip">支持 jpg、jpeg、png、gif、webp 格式，不超过 2MB</p>
</article>
<div class="profile-grid" id="profileContainer"></div>
</section>
<section class="password-section">
<div class="profile-card">
<h2>修改密码</h2>
<div class="pwd-field"><label>当前密码</label><div class="pwd-input-wrap"><input type="password" id="oldPassword" placeholder="请输入当前密码" autocomplete="current-password"><button type="button" class="pwd-toggle" data-target="oldPassword" title="显示/隐藏密码"><svg viewBox="0 0 24 24" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg viewBox="0 0 24 24" class="eye-closed" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div></div>
<div class="pwd-field"><label>新密码</label><div class="pwd-input-wrap"><span class="pwd-input-inner"><input type="password" id="newPassword" placeholder="至少12位，含大写+小写+数字+特殊字符" autocomplete="new-password"><button type="button" class="pwd-toggle" data-target="newPassword" title="显示/隐藏密码"><svg viewBox="0 0 24 24" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg viewBox="0 0 24 24" class="eye-closed" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></span><button type="button" class="btn-generate" id="btnGenerate" title="生成16位随机安全密码">生成安全密码</button></div>
<div class="pwd-strength-bar"><div class="pwd-strength-bar-fill" id="strengthBar"></div></div>
<div class="pwd-strength-text" id="strengthText"></div>
<div class="pwd-hint" id="pwdHint"><span class="unmet" id="hintLength">≥12位</span><span class="unmet" id="hintUpper">大写字母</span><span class="unmet" id="hintLower">小写字母</span><span class="unmet" id="hintDigit">数字</span><span class="unmet" id="hintSpecial">特殊字符</span></div>
</div>
<div class="pwd-field"><label>确认新密码</label><div class="pwd-input-wrap"><input type="password" id="confirmPassword" placeholder="请再次输入新密码" autocomplete="new-password"><button type="button" class="pwd-toggle" data-target="confirmPassword" title="显示/隐藏密码"><svg viewBox="0 0 24 24" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg viewBox="0 0 24 24" class="eye-closed" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div><div class="pwd-match-info" id="pwdMatchInfo"></div></div>
<div class="pwd-field"><label>邮箱验证码</label><div class="verify-row"><input type="text" id="verificationCode" placeholder="请输入6位验证码" maxlength="6" autocomplete="one-time-code"><button type="button" class="btn-send-code" id="btnSendCode">发送验证码</button></div></div>
<div class="pwd-message" id="pwdMessage"></div>
<div style="margin-top:20px"><button type="button" class="btn-submit-pwd" id="btnSubmitPassword" disabled>确认修改密码</button></div>
</div>
</section>
</div>
</div>
<div class="countdown-overlay" id="countdownOverlay"><div class="countdown-box"><h3>密码修改成功</h3><p>系统将在几秒后跳转到登录页</p><div class="countdown-num" id="countdownNum">3</div></div></div>
<script src="https://cdn.staticfile.net/layui/2.9.13/layui.js"></script>
<script src="/js/common.js"></script>
<script>
layui.use(["layer"],function(){var layer=layui.layer;
var avatarFileInput=document.getElementById("avatarFile");
var avatarPreview=document.getElementById("avatarPreview");
var avatarName=document.getElementById("avatarName");
var selectAvatarButton=document.getElementById("selectAvatarButton");
var uploadAvatarButton=document.getElementById("uploadAvatarButton");
var cachedUser=PlatformUtils.getCurrentUser();
var currentUser=null,selectedFile=null;
var oldPasswordInput=document.getElementById("oldPassword");
var newPasswordInput=document.getElementById("newPassword");
var confirmPasswordInput=document.getElementById("confirmPassword");
var verificationCodeInput=document.getElementById("verificationCode");
var btnGenerate=document.getElementById("btnGenerate");
var btnSendCode=document.getElementById("btnSendCode");
var btnSubmitPassword=document.getElementById("btnSubmitPassword");
var strengthBar=document.getElementById("strengthBar");
var strengthText=document.getElementById("strengthText");
var pwdMessage=document.getElementById("pwdMessage");
var pwdMatchInfo=document.getElementById("pwdMatchInfo");
var countdownOverlay=document.getElementById("countdownOverlay");
var countdownNum=document.getElementById("countdownNum");
var hintLength=document.getElementById("hintLength");
var hintUpper=document.getElementById("hintUpper");
var hintLower=document.getElementById("hintLower");
var hintDigit=document.getElementById("hintDigit");
var hintSpecial=document.getElementById("hintSpecial");
var sendCodeTimer=null,sendCodeCountdown=0;
if(cachedUser){currentUser=cachedUser;renderProfile(cachedUser)}
loadCurrentUser();
document.querySelectorAll(".pwd-toggle").forEach(function(btn){btn.addEventListener("click",function(){var t=this.getAttribute("data-target");var i=document.getElementById(t);var o=this.querySelector(".eye-open");var c=this.querySelector(".eye-closed");if(i.type==="password"){i.type="text";o.style.display="none";c.style.display="block"}else{i.type="password";o.style.display="block";c.style.display="none"}})});
selectAvatarButton.addEventListener("click",function(){avatarFileInput.click()});
avatarFileInput.addEventListener("change",function(){var f=avatarFileInput.files[0];selectedFile=f||null;if(!f){renderAvatar(currentUser?currentUser.userHeader:"");avatarName.textContent=currentUser&&currentUser.userHeader?"当前头像":"尚未设置头像";return}avatarName.textContent=f.name;var r=new FileReader();r.onload=function(e){avatarPreview.src=e.target.result};r.readAsDataURL(f)});
uploadAvatarButton.addEventListener("click",function(){if(!selectedFile){layer.msg("请先选择头像文件");return}var fd=new FormData();fd.append("file",selectedFile);fetch("/api/user/current/avatar",{method:"POST",headers:PlatformUtils.authHeaders(),body:fd}).then(async function(r){var d=await r.json();if(!r.ok)throw new Error(d.message||"头像上传失败");layer.msg("头像已更新");selectedFile=null;avatarFileInput.value="";currentUser=d;renderProfile(d);return PlatformUtils.request("/api/auth/me")}).then(function(a){if(a.success&&a.user)PlatformUtils.setCurrentUser(a.user)}).catch(function(e){layer.msg(e.message||"头像上传失败")})});
function checkPasswordStrength(p){if(!p){strengthBar.className="pwd-strength-bar-fill";strengthText.className="pwd-strength-text";strengthText.textContent="";hintLength.className="unmet";hintUpper.className="unmet";hintLower.className="unmet";hintDigit.className="unmet";hintSpecial.className="unmet";newPasswordInput.className="";return{level:"none",score:0}}var hl=p.length>=12;var hu=/[A-Z]/.test(p);var hl_=/[a-z]/.test(p);var hd=/\d/.test(p);var hs=/[!@#$%^&*()_+\-=\[\]{};:'"\|,.<>\/?~]/.test(p);hintLength.className=hl?"met":"unmet";hintUpper.className=hu?"met":"unmet";hintLower.className=hl_?"met":"unmet";hintDigit.className=hd?"met":"unmet";hintSpecial.className=hs?"met":"unmet";var sc=0;if(hl)sc++;if(hu)sc++;if(hl_)sc++;if(hd)sc++;if(hs)sc++;var lv,bc,tc,ic;if(sc<=2){lv="弱";bc="weak";tc="weak";ic="is-weak"}else if(sc<=3){lv="中";bc="medium";tc="medium";ic="is-medium"}else if(sc===4){lv="中";bc="medium";tc="medium";ic="is-medium"}else{lv="强";bc="strong";tc="strong";ic="is-strong"}strengthBar.className="pwd-strength-bar-fill "+bc;strengthText.className="pwd-strength-text "+tc;strengthText.textContent="密码强度："+lv;newPasswordInput.className=ic;return{level:lv,score:sc}}
function checkPasswordMatch(){var n=newPasswordInput.value;var c=confirmPasswordInput.value;if(!c){pwdMatchInfo.style.display="none";pwdMatchInfo.textContent="";confirmPasswordInput.className="";return false}pwdMatchInfo.style.display="block";if(n===c){pwdMatchInfo.innerHTML='<span style="color:#10b981">✓ 两次密码输入一致</span>';confirmPasswordInput.className="is-strong";return true}else{pwdMatchInfo.innerHTML='<span style="color:#ef4444">✗ 两次密码输入不一致</span>';confirmPasswordInput.className="is-weak";return false}}
function updateSubmitButton(){var o=oldPasswordInput.value.trim();var n=newPasswordInput.value.trim();var c=confirmPasswordInput.value.trim();var v=verificationCodeInput.value.trim();var s=checkPasswordStrength(n);var m=n===c&&n.length>0;var cv=v.length===6&&/^\d{6}$/.test(v);var ok=o.length>0&&n.length>=12&&s.score>=5&&m&&cv;btnSubmitPassword.disabled=!ok}
newPasswordInput.addEventListener("input",function(){checkPasswordStrength(this.value);checkPasswordMatch();hideMessage();updateSubmitButton()});
confirmPasswordInput.addEventListener("input",function(){checkPasswordMatch();hideMessage();updateSubmitButton()});
oldPasswordInput.addEventListener("input",function(){hideMessage();updateSubmitButton()});
verificationCodeInput.addEventListener("input",function(){hideMessage();updateSubmitButton()});
btnGenerate.addEventListener("click",function(){var l=16;var uc="ABCDEFGHIJKLMNOPQRSTUVWXYZ";var lc="abcdefghijklmnopqrstuvwxyz";var dc="0123456789";var sc="!@#$%^&*()_+-=[]{}|;:,.<>?";var p=[];p.push(uc[Math.floor(Math.random()*uc.length)]);p.push(lc[Math.floor(Math.random()*lc.length)]);p.push(dc[Math.floor(Math.random()*dc.length)]);p.push(sc[Math.floor(Math.random()*sc.length)]);var ac=uc+lc+dc+sc;for(var i=p.length;i<l;i++)p.push(ac[Math.floor(Math.random()*ac.length)]);for(var i=p.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=p[i];p[i]=p[j];p[j]=t}var g=p.join("");newPasswordInput.value=g;confirmPasswordInput.value=g;checkPasswordStrength(g);checkPasswordMatch();updateSubmitButton();newPasswordInput.dispatchEvent(new Event("input"))});
btnSendCode.addEventListener("click",function(){if(sendCodeCountdown>0)return;btnSendCode.disabled=true;hideMessage();var ad=null;try{ad=JSON.parse(localStorage.getItem("threat-platform-auth")||sessionStorage.getItem("threat-platform-auth")||"{}")}catch(e){ad={}}var tk=ad.token||"";var hd={};if(tk)hd["Authorization"]="Bearer "+tk;console.log("send-code token:",tk?"found":"MISSING");fetch("/api/user/current/password/send-code",{method:"POST",headers:hd}).then(async function(r){console.log("send-code response:",r.status);var d=await r.json();if(r.status===401){btnSendCode.disabled=false;showMessage("error","登录已过期，请刷新页面重新登录");return}if(!r.ok||!d.success)throw new Error(d.message||"发送验证码失败");showMessage("hint","验证码已发送至您的邮箱，5分钟内有效");startSendCodeCountdown(60)}).catch(function(e){btnSendCode.disabled=false;console.log("send-code error:",e.message);showMessage("error",e.message||"发送验证码失败")})});
function startSendCodeCountdown(s){sendCodeCountdown=s;btnSendCode.textContent=s+"秒后重发";btnSendCode.disabled=true;sendCodeTimer=setInterval(function(){sendCodeCountdown--;if(sendCodeCountdown<=0){clearInterval(sendCodeTimer);btnSendCode.textContent="发送验证码";btnSendCode.disabled=false}else{btnSendCode.textContent=sendCodeCountdown+"秒后重发"}},1000)}
btnSubmitPassword.addEventListener("click",function(){var o=oldPasswordInput.value.trim();var n=newPasswordInput.value.trim();var c=confirmPasswordInput.value.trim();var v=verificationCodeInput.value.trim();if(!o){showMessage("hint","请输入当前密码");oldPasswordInput.focus();return}if(!n){showMessage("hint","请输入新密码");newPasswordInput.focus();return}if(n.length<12){showMessage("hint","新密码长度至少12位");newPasswordInput.focus();return}var s=checkPasswordStrength(n);if(s.score<5){showMessage("hint","密码必须包含大写字母、小写字母、数字和特殊字符");newPasswordInput.focus();return}if(!c){showMessage("hint","请确认新密码");confirmPasswordInput.focus();return}if(n!==c){showMessage("hint","两次密码输入不一致，请重新输入");confirmPasswordInput.focus();return}if(!v){showMessage("hint","请输入验证码");verificationCodeInput.focus();return}if(v.length!==6||!/^\d{6}$/.test(v)){showMessage("hint","验证码必须为6位数字");verificationCodeInput.focus();return}btnSubmitPassword.disabled=true;hideMessage();PlatformUtils.request("/api/user/current/password/change",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({oldPassword:o,newPassword:n,verificationCode:v})}).then(function(r){showCountdownAndLogout()}).catch(function(e){btnSubmitPassword.disabled=false;updateSubmitButton();showMessage("error",e.message||"密码修改失败")})});
function showCountdownAndLogout(){countdownOverlay.classList.add("show");var c=3;countdownNum.textContent=c;var iv=setInterval(function(){c--;if(c<=0){clearInterval(iv);PlatformUtils.clearAuth();if(window.top){window.top.location.href="/login.html?message="+encodeURIComponent("密码修改成功，请重新登录")}else{window.location.href="/login.html?message="+encodeURIComponent("密码修改成功，请重新登录")}}else{countdownNum.textContent=c}},1000)}
function showMessage(l,t){pwdMessage.className="pwd-message "+l;pwdMessage.textContent=t}
function hideMessage(){pwdMessage.className="pwd-message";pwdMessage.textContent=""}
function loadCurrentUser(){PlatformUtils.request("/api/user/current").then(function(d){currentUser=d;renderProfile(d)}).catch(function(e){layer.msg(e.message||"获取用户信息失败")})}
function renderProfile(d){renderAvatar(d.userHeader);avatarName.textContent=d.userHeader?"当前头像":"尚未设置头像";document.getElementById("profileContainer").innerHTML=[renderProfileCard("基本资料",[["用户名",d.userName],["手机号",d.userPhone],["邮箱",d.userEmail],["角色",Array.isArray(d.roleNames)&&d.roleNames.length?d.roleNames.join("、"):"--"],["头像地址",d.userHeader]]),renderProfileCard("账户信息",[["状态",PlatformUtils.renderStatus(d.userStatus)],["失败次数",d.failedAttempts],["锁定时间",PlatformUtils.formatDateTime(d.lockTime)],["最后登录",PlatformUtils.formatDateTime(d.lastLoginTime)],["创建时间",PlatformUtils.formatDateTime(d.createdAt)],["更新时间",PlatformUtils.formatDateTime(d.updatedAt)]])].join("")}
function renderAvatar(u){avatarPreview.src=u||"/images/default-avatar.svg"}
function renderProfileCard(t,items){return '<section class="profile-card"><h2>'+t+'</h2>'+items.map(function(i){return '<div class="profile-item"><span>'+i[0]+'</span><strong>'+PlatformUtils.renderValue(i[1])+'</strong></div>'}).join("")+'</section>'}
updateSubmitButton()});
</script>
</body>
</html>
