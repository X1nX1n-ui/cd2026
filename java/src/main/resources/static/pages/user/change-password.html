<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修改密码 - 威胁感知平台</title>
<link rel="stylesheet" href="/css/layui.css?v=3">
<link rel="stylesheet" href="/css/app.css?v=3">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0e17 0%,#111827 50%,#0d1117 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:"Segoe UI","Microsoft YaHei",sans-serif}
.change-pwd-shell{width:100%;max-width:460px;padding:20px}
.change-pwd-card{background:rgba(15,18,26,.92);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:36px 32px;backdrop-filter:blur(12px);box-shadow:0 24px 64px rgba(0,0,0,.4)}
.change-pwd-card h2{font-size:22px;color:#eef2f7;margin-bottom:6px;font-weight:600}
.change-pwd-card .subtitle{font-size:13px;color:#9499a5;margin-bottom:28px}
.avatar-wrap{display:flex;justify-content:center;margin-bottom:20px}
.avatar-img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid rgba(79,134,247,.3);background:rgba(79,134,247,.1)}
.avatar-fallback{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4f86f7,#7c5cfc);display:flex;align-items:center;justify-content:center;border:2px solid rgba(79,134,247,.3)}
.avatar-fallback svg{width:28px;height:28px;stroke:#eef2f7;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pwd-field{margin-bottom:18px}
.pwd-field label{display:block;font-size:13px;color:#9499a5;margin-bottom:6px;font-weight:500}
.pwd-input-wrap{display:flex;gap:8px;align-items:center;position:relative}
.pwd-input-wrap input,.verify-row input{flex:1;height:44px;padding:0 14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(10,13,19,.88);color:#dce4f0;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.pwd-input-wrap input:focus,.verify-row input:focus{border-color:#4f86f7;box-shadow:0 0 0 3px rgba(79,134,247,.15)}
.pwd-input-wrap input::placeholder,.verify-row input::placeholder{color:rgba(140,144,159,.45)}
.pwd-input-inner{position:relative;flex:1;display:flex}
.pwd-input-inner input{padding:0 40px 0 14px;flex:1}
.pwd-toggle{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:rgba(148,153,165,.5);cursor:pointer;border-radius:8px;transition:all .15s}
.pwd-toggle:hover{color:#9499a5;background:rgba(79,134,247,.1)}
.pwd-toggle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.pwd-strength-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden}
.pwd-strength-bar-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.pwd-strength-bar-fill.weak{width:33%;background:#ef4444}
.pwd-strength-bar-fill.medium{width:66%;background:#f59e0b}
.pwd-strength-bar-fill.strong{width:100%;background:#10b981}
.pwd-strength-text{font-size:12px;margin-top:4px;display:flex;align-items:center;gap:4px}
.pwd-strength-text.weak{color:#ef4444}
.pwd-strength-text.medium{color:#f59e0b}
.pwd-strength-text.strong{color:#10b981}
.pwd-hint{font-size:12px;color:#9499a5;margin-top:2px;display:flex;flex-wrap:wrap;gap:6px}
.pwd-hint span{display:inline-flex;align-items:center;gap:2px}
.pwd-hint span.met{color:#10b981}
.pwd-hint span.unmet{color:rgba(148,153,165,.5)}
.btn-generate{height:38px;padding:0 14px;border:1px solid rgba(255,255,255,.08);background:rgba(10,13,19,.88);color:#9499a5;border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-generate:hover{border-color:#4f86f7;color:#dce8ff;background:rgba(79,134,247,.12)}
.verify-row{display:flex;gap:8px;align-items:center}
.btn-send-code{height:44px;padding:0 16px;border:1px solid rgba(255,255,255,.08);background:rgba(10,13,19,.88);color:#9499a5;border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-send-code:hover:not(:disabled){border-color:#4f86f7;color:#dce8ff;background:rgba(79,134,247,.12)}
.btn-send-code:disabled{opacity:.4;cursor:not-allowed}
.btn-submit{width:100%;height:46px;background:linear-gradient(180deg,#5f95ff 0%,#4f86f7 100%);color:#eef2f7;border:1px solid rgba(79,134,247,.3);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .15s}
.btn-submit:hover:not(:disabled){background:linear-gradient(180deg,#76a5ff 0%,#5b90fb 100%);box-shadow:0 8px 24px rgba(79,134,247,.24)}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.pwd-message{font-size:13px;margin-top:12px;padding:10px 14px;border-radius:10px;display:none;line-height:1.5}
.pwd-message.show{display:block}
.pwd-message.info{background:rgba(79,134,247,.1);color:#86aefc;border:1px solid rgba(79,134,247,.18)}
.pwd-message.warning{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.18)}
.pwd-message.error{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.18)}
.pwd-match-info{font-size:12px;margin-top:4px;color:#10b981;display:none}
.back-link{display:block;text-align:center;margin-top:20px;color:#9499a5;font-size:13px;text-decoration:none;transition:color .15s}
.back-link:hover{color:#b8c8e8}
#usernameSection{display:none}
</style>
</head>
<body>
<div class="change-pwd-shell">
<div class="change-pwd-card">
<div class="avatar-wrap" id="avatarWrap">
<div class="avatar-fallback"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg></div>
</div>
<h2 id="pageTitle">修改密码</h2>
<p class="subtitle" id="pageSubtitle">请输入相关信息以修改您的密码</p>

<div id="usernameSection" class="pwd-field">
<label>用户名</label>
<div class="pwd-input-wrap"><input type="text" id="resetUsername" placeholder="请输入您的用户名" autocomplete="username"></div>
</div>

<div id="oldPwdSection" class="pwd-field">
<label>当前密码</label>
<div class="pwd-input-wrap"><input type="password" id="oldPassword" placeholder="请输入当前密码" autocomplete="current-password"><button type="button" class="pwd-toggle" data-target="oldPassword"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
</div>

<div class="pwd-field"><label>新密码</label>
<div class="pwd-input-wrap"><span class="pwd-input-inner"><input type="password" id="newPassword" placeholder="至少12位，含大写+小写+数字+特殊字符" autocomplete="new-password"><button type="button" class="pwd-toggle" data-target="newPassword"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button><button type="button" class="btn-generate" id="btnGenerate" style="margin-left:8px">生成安全密码</button></span></div>
<div class="pwd-strength-bar"><div class="pwd-strength-bar-fill" id="strengthBar"></div></div>
<div class="pwd-strength-text" id="strengthText"></div>
<div class="pwd-hint" id="pwdHint"><span class="unmet" id="hintLength">≥12位</span><span class="unmet" id="hintUpper">大写字母</span><span class="unmet" id="hintLower">小写字母</span><span class="unmet" id="hintDigit">数字</span><span class="unmet" id="hintSpecial">特殊字符</span></div>
</div>

<div class="pwd-field"><label>确认新密码</label>
<div class="pwd-input-wrap"><input type="password" id="confirmPassword" placeholder="请再次输入新密码" autocomplete="new-password"><button type="button" class="pwd-toggle" data-target="confirmPassword"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
<div class="pwd-match-info" id="pwdMatchInfo"></div>
</div>

<div class="pwd-field"><label>邮箱验证码</label>
<div class="verify-row"><input type="text" id="verificationCode" placeholder="请输入6位验证码" maxlength="6" autocomplete="one-time-code"><button type="button" class="btn-send-code" id="btnSendCode">发送验证码</button></div>
</div>

<div class="pwd-message" id="pwdMessage"></div>
<button type="button" class="btn-submit" id="btnSubmit" disabled>确认修改密码</button>
</div>
<a class="back-link" id="backLink" href="/login.html">返回登录</a>
</div>

<script src="/js/common.js?v=3"></script>
<script>
(function(){
var loggedIn = !!PlatformUtils.getToken();
var isLoginFlow = !loggedIn;
var oldPwdSection=document.getElementById("oldPwdSection");
var usernameSection=document.getElementById("usernameSection");
var resetUsername=document.getElementById("resetUsername");
var oldPassword=document.getElementById("oldPassword");
var newPassword=document.getElementById("newPassword");
var confirmPassword=document.getElementById("confirmPassword");
var verificationCode=document.getElementById("verificationCode");
var btnGenerate=document.getElementById("btnGenerate");
var btnSendCode=document.getElementById("btnSendCode");
var btnSubmit=document.getElementById("btnSubmit");
var strengthBar=document.getElementById("strengthBar");
var strengthText=document.getElementById("strengthText");
var pwdMessage=document.getElementById("pwdMessage");
var pwdMatchInfo=document.getElementById("pwdMatchInfo");
var backLink=document.getElementById("backLink");
var pageTitle=document.getElementById("pageTitle");
var pageSubtitle=document.getElementById("pageSubtitle");
var hintLength=document.getElementById("hintLength");
var hintUpper=document.getElementById("hintUpper");
var hintLower=document.getElementById("hintLower");
var hintDigit=document.getElementById("hintDigit");
var hintSpecial=document.getElementById("hintSpecial");
var sendCodeTimer=null,sendCodeCountdown=0;

if(loggedIn){PlatformUtils.request("/api/user/current").then(function(d){if(d&&d.userHeader){var aw=document.getElementById("avatarWrap");aw.innerHTML='<img class="avatar-img" src="'+d.userHeader+'" alt="avatar">';}}).catch(function(){})}

if(isLoginFlow){oldPwdSection.style.display="none";usernameSection.style.display="block";pageTitle.textContent="忘记密码";pageSubtitle.textContent="通过邮箱验证码重置您的密码";backLink.href="/login.html";backLink.textContent="返回登录"}else{backLink.href="#";backLink.textContent="返回个人中心";backLink.addEventListener("click",function(e){e.preventDefault();if(window.top&&window.top.location.href.indexOf("index.html")>=0){window.location.href="/pages/user/profile.html"}else{window.history.back()}})}

document.querySelectorAll(".pwd-toggle").forEach(function(btn){btn.addEventListener("click",function(){var target=document.getElementById(this.getAttribute("data-target"));var svg=this.querySelector("svg");if(target.type==="password"){target.type="text";svg.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'}else{target.type="password";svg.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'}})});

function checkPasswordStrength(p){if(!p){strengthBar.className="pwd-strength-bar-fill";strengthText.className="pwd-strength-text";strengthText.textContent="";hintLength.className="unmet";hintUpper.className="unmet";hintLower.className="unmet";hintDigit.className="unmet";hintSpecial.className="unmet";newPassword.className="";return 0}var score=0;if(p.length>=12){score++;hintLength.className="met"}else hintLength.className="unmet";if(/[A-Z]/.test(p)){score++;hintUpper.className="met"}else hintUpper.className="unmet";if(/[a-z]/.test(p)){score++;hintLower.className="met"}else hintLower.className="unmet";if(/[0-9]/.test(p)){score++;hintDigit.className="met"}else hintDigit.className="unmet";if(/[^A-Za-z0-9]/.test(p)){score++;hintSpecial.className="met"}else hintSpecial.className="unmet";if(score<=2){strengthBar.className="pwd-strength-bar-fill weak";strengthText.className="pwd-strength-text weak";strengthText.textContent="弱";newPassword.className="is-weak"}else if(score<=4){strengthBar.className="pwd-strength-bar-fill medium";strengthText.className="pwd-strength-text medium";strengthText.textContent="中等";newPassword.className="is-medium"}else{strengthBar.className="pwd-strength-bar-fill strong";strengthText.className="pwd-strength-text strong";strengthText.textContent="强";newPassword.className="is-strong"}return score}

function checkPasswordMatch(){var n=newPassword.value;var c=confirmPassword.value;if(!c){pwdMatchInfo.style.display="none";pwdMatchInfo.textContent="";confirmPassword.className="";return false}if(n===c){pwdMatchInfo.style.display="block";pwdMatchInfo.textContent="两次密码一致";pwdMatchInfo.style.color="#10b981";confirmPassword.className="is-strong";return true}else{pwdMatchInfo.style.display="block";pwdMatchInfo.textContent="两次密码不一致";pwdMatchInfo.style.color="#ef4444";confirmPassword.className="is-weak";return false}}

function updateSubmit(){var n=newPassword.value.trim();var c=confirmPassword.value.trim();var v=verificationCode.value.trim();var s=checkPasswordStrength(n);checkPasswordMatch();if(isLoginFlow){var u=resetUsername.value.trim();btnSubmit.disabled=!(u&&n.length>=12&&s>=5&&n===c&&v.length===6)}else{var o=oldPassword.value.trim();btnSubmit.disabled=!(o&&n.length>=12&&s>=5&&n===c&&v.length===6)}}

newPassword.addEventListener("input",function(){checkPasswordStrength(this.value);checkPasswordMatch();hideMsg();updateSubmit()});
confirmPassword.addEventListener("input",function(){checkPasswordMatch();hideMsg();updateSubmit()});
verificationCode.addEventListener("input",function(){hideMsg();updateSubmit()});
if(oldPassword)oldPassword.addEventListener("input",function(){hideMsg();updateSubmit()});
if(resetUsername)resetUsername.addEventListener("input",function(){hideMsg();updateSubmit()});

btnGenerate.addEventListener("click",function(){var len=16;var uc="ABCDEFGHIJKLMNOPQRSTUVWXYZ";var lc="abcdefghijklmnopqrstuvwxyz";var dc="0123456789";var sc="!@#$%^&*()_+-=[]{}|;:,.<>?";var p=[uc[Math.floor(Math.random()*uc.length)],lc[Math.floor(Math.random()*lc.length)],dc[Math.floor(Math.random()*dc.length)],sc[Math.floor(Math.random()*sc.length)]];var all=uc+lc+dc+sc;for(var i=4;i<len;i++)p.push(all[Math.floor(Math.random()*all.length)]);for(var i=p.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=p[i];p[i]=p[j];p[j]=t}var pw=p.join("");newPassword.value=pw;confirmPassword.value=pw;checkPasswordStrength(pw);checkPasswordMatch();updateSubmit()});

btnSendCode.addEventListener("click",function(){if(sendCodeCountdown>0)return;btnSendCode.disabled=true;hideMsg();if(isLoginFlow){var uname=resetUsername.value.trim();if(!uname){showMsg("error","请先输入用户名");btnSendCode.disabled=false;return}fetch("/api/auth/send-reset-code",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:uname})}).then(function(r){return r.json()}).then(function(d){if(d.success){startCountdown(60);showMsg("info",d.message)}else{btnSendCode.disabled=false;showMsg("error",d.message)}}).catch(function(){btnSendCode.disabled=false;showMsg("error","发送失败，请稍后重试")})}else{var ad=null;try{ad=JSON.parse(localStorage.getItem("threat-platform-auth")||sessionStorage.getItem("threat-platform-auth"))}catch(e){}if(!ad||!ad.token){showMsg("error","未登录或登录已过期");btnSendCode.disabled=false;return}fetch("/api/user/current/password/send-code",{method:"POST",headers:{"Authorization":"Bearer "+ad.token}}).then(function(r){if(r.status===401)throw new Error("登录已过期");return r.json()}).then(function(d){if(d.success!==false){startCountdown(60);showMsg("info","验证码已发送至注册邮箱")}else{btnSendCode.disabled=false;showMsg("error",d.message||"发送失败")}}).catch(function(e){btnSendCode.disabled=false;showMsg("error",e.message||"发送失败")})}});

function startCountdown(s){sendCodeCountdown=s;btnSendCode.textContent=s+"秒后重发";btnSendCode.disabled=true;sendCodeTimer=setInterval(function(){sendCodeCountdown--;if(sendCodeCountdown<=0){clearInterval(sendCodeTimer);btnSendCode.textContent="发送验证码";btnSendCode.disabled=false}else{btnSendCode.textContent=sendCodeCountdown+"秒后重发"}},1000)}

btnSubmit.addEventListener("click",function(){if(btnSubmit.disabled)return;var n=newPassword.value.trim();var c=confirmPassword.value.trim();var v=verificationCode.value.trim();if(n.length<12||checkPasswordStrength(n)<5){showMsg("error","新密码不满足安全要求（≥12位+大小写+数字+特殊字符）");return}if(n!==c){showMsg("error","两次输入的密码不一致");return}if(v.length!==6||!/^\d{6}$/.test(v)){showMsg("error","请输入6位数字验证码");return}btnSubmit.disabled=true;btnSubmit.textContent="提交中...";if(isLoginFlow){var uname=resetUsername.value.trim();fetch("/api/auth/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:uname,code:v,newPassword:n})}).then(function(r){return r.json()}).then(function(d){if(d.success){showMsg("info",d.message+"，3秒后跳转登录页...");setTimeout(function(){window.location.href="/login.html"},3000)}else{btnSubmit.disabled=false;btnSubmit.textContent="确认修改密码";showMsg("error",d.message)}}).catch(function(){btnSubmit.disabled=false;btnSubmit.textContent="确认修改密码";showMsg("error","修改失败，请稍后重试")})}else{var o=oldPassword.value.trim();var ad=null;try{ad=JSON.parse(localStorage.getItem("threat-platform-auth")||sessionStorage.getItem("threat-platform-auth"))}catch(e){}fetch("/api/user/current/password/change",{method:"POST",headers:{"Authorization":"Bearer "+(ad?ad.token:""),"Content-Type":"application/json"},body:JSON.stringify({oldPassword:o,newPassword:n,verificationCode:v})}).then(function(r){if(r.status===401)throw new Error("登录已过期");return r.json()}).then(function(d){if(d.success!==false){showMsg("info","密码修改成功，3秒后跳转登录页...");setTimeout(function(){PlatformUtils.clearAuth();if(window.top)window.top.location.href="/login.html";else window.location.href="/login.html"},3000)}else{btnSubmit.disabled=false;btnSubmit.textContent="确认修改密码";showMsg("error",d.message||"密码或验证码错误，请重试")}}).catch(function(e){btnSubmit.disabled=false;btnSubmit.textContent="确认修改密码";showMsg("error",e.message||"修改失败")})}});

function showMsg(type,text){pwdMessage.className="pwd-message show "+type;pwdMessage.textContent=text}
function hideMsg(){pwdMessage.className="pwd-message";pwdMessage.textContent=""}
updateSubmit()})();
</script>
</body>
</html>
